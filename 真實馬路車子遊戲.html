<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亡命飆速 - 警車攔截版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; color: white; }
        .title { font-size: 42px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px #007bff; margin-bottom: 10px; }
        .warning-text { color: #ff4444; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .setting-group { margin: 10px 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        .setting-label { font-size: 14px; color: #00d2ff; margin-bottom: 8px; font-weight: bold; }
        .option-group { display: flex; gap: 8px; }
        .opt-btn { padding: 8px 18px; border: 1px solid #007bff; background: transparent; color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 10px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 15px 45px; font-size: 22px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,123,255,0.6); }
        .start-btn:disabled { background: #444; cursor: wait; }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 2000; }
        #scoreDisplay { font-size: 32px; color: #0f0; font-family: monospace; font-weight: bold; float: right; text-shadow: 0 0 10px #0f0; }
        #hp-container { width: 180px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 5px; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(to right, #ff3333, #ff6666); transition: 0.3s; }
        #speedo { color: #fff; font-size: 18px; font-weight: bold; clear: both; float: right; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="title">亡命飆速</div>
        <div class="warning-text">⚠️ 警告：警方路障已佈署！逃離追捕！</div>
        
        <div class="setting-group">
            <div class="setting-label">🕹️ 操作模式</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤 / 手機點擊</button>
                <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">體感陀螺儀</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🛡️ 挑戰難度</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🔥 遊戲模式</div>
            <div class="option-group">
                <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 極限 (一撞即死)</button>
                <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ 護甲 (有HP)</button>
            </div>
        </div>

        <button id="start-btn" class="start-btn" disabled onclick="requestAndStart()">資源載入中...</button>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="speedo">0 KM/H</div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, grassPlane, gameStarted = false, score = 0;
        let obstacles = [], decor = [], roadLines = [];
        let obsCarModels = {}; // 💡 改用物件存儲，方便根據名稱處理旋轉
        let policeLightR, policeLightB; 
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.6, hp = 100;
        let settings = { ctrl: 'touch', mode: 'hard', diff: 1 };
        let loadedCount = 0;

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        function requestAndStart() {
            document.getElementById('bgm').play().catch(() => {});
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            if (settings.mode === 'easy') document.getElementById('hp-container').style.display = 'block';
            currentSpeed = 1.2 + (settings.diff * 0.5); 
            initControls(); animate();
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = Math.floor(currentSpeed * 50) + " KM/H";
                    updateSeasons(); 
                }
            }, 100);
            setInterval(createObstacle, 1000 - (settings.diff * 120));
            setInterval(createDecor, 600);
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 180);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(10, 50, 10); scene.add(sun);

            const grassGeo = new THREE.PlaneGeometry(2000, 2000);
            grassPlane = new THREE.Mesh(grassGeo, new THREE.MeshPhongMaterial({ color: 0x7cfc00 }));
            grassPlane.rotation.x = -Math.PI / 2; grassPlane.position.y = -0.1; scene.add(grassPlane);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);

            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 7), new THREE.MeshBasicMaterial({ color: 0xcccccc }));
                line.rotation.x = -Math.PI / 2; line.position.set(-1.8, 0.05, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.8; scene.add(line2); roadLines.push(line2);
            }

            const loader = new THREE.GLTFLoader();
            car = new THREE.Group(); scene.add(car);

            // 1. 載入主角車
            loader.load('car.glb', (gltf) => { 
                gltf.scene.scale.set(6, 6, 6); 
                gltf.scene.rotation.y = 0; 
                car.add(gltf.scene); 
                checkLoaded();
            });

            // 2. 載入路障車輛 CAR1 ~ CAR6
            const carFiles = ['CAR1.glb', 'CAR2.glb', 'CAR3.glb', 'CAR4.glb', 'CAR5.glb', 'CAR6.glb'];
            carFiles.forEach(file => {
                loader.load(file, (gltf) => {
                    let model = gltf.scene;
                    model.scale.set(6, 6, 6);
                    obsCarModels[file] = model; // 存入物件，Key 是檔名
                    checkLoaded();
                });
            });

            policeLightR = new THREE.PointLight(0xff0000, 0, 50);
            policeLightB = new THREE.PointLight(0x0000ff, 0, 50);
            scene.add(policeLightR, policeLightB);

            camera.position.set(0, 8, 28); camera.lookAt(0, 2, 0);
            car.position.z = 15;
        }

        function checkLoaded() {
            loadedCount++; 
            if(loadedCount >= 7) { 
                document.getElementById('start-btn').disabled = false; 
                document.getElementById('start-btn').innerText = "進入賽道"; 
            }
        }

        function createObstacle() {
            const modelKeys = Object.keys(obsCarModels);
            if (!gameStarted || modelKeys.length === 0) return;
            
            let obs = new THREE.Group();
            let randomKey = modelKeys[Math.floor(Math.random() * modelKeys.length)];
            let carClone = obsCarModels[randomKey].clone();
            
            // 💡 旋轉邏輯修正
            if (randomKey === 'CAR6.glb') {
                // 如果是警車，橫著放 (轉 90 度)
                carClone.rotation.y = Math.PI / 2; 
            } else {
                // 如果是 1~5 號車，正常往前開 (與主角同向)
                carClone.rotation.y = 0; 
            }
            
            obs.add(carClone);
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0, -120);
            scene.add(obs); obstacles.push(obs);
        }

        function createDecor() {
            if (!gameStarted) return;
            const side = Math.random() > 0.5 ? 1 : -1;
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2.5), new THREE.MeshPhongMaterial({color: 0x8B4513}));
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(2.5, 6, 8), new THREE.MeshPhongMaterial({color: 0x228b22}));
            foliage.position.y = 4; tree.add(trunk, foliage);
            tree.position.set(side * 14, 1, -150);
            scene.add(tree); decor.push(tree);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1; 

            let flash = Math.floor(Date.now() / 150) % 2;
            policeLightR.intensity = (flash === 0) ? 25 : 0;
            policeLightB.intensity = (flash === 1) ? 25 : 0;
            policeLightR.position.set(car.position.x - 5, 5, 25);
            policeLightB.position.set(car.position.x + 5, 5, 25);

            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 40) l.position.z = -200; });
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 40) { scene.remove(d); decor.splice(i, 1); }});
            
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                const distZ = Math.abs(car.position.z - obs.position.z);
                const distX = Math.abs(car.position.x - obs.position.x);
                
                if (distZ < 2.0 && distX < 1.2) {
                    document.getElementById('crashSound').play();
                    gameStarted = false; setTimeout(() => { alert("🚨 逮捕歸案！得分: " + score); location.reload(); }, 100);
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }

        function updateSeasons() {
            const seasonIndex = Math.floor(score / 150) % 4;
            const skyColors = [0x87CEEB, 0xfff9c4, 0xffcc80, 0xd1d9e6];
            const grassColors = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff];
            if(scene) {
                scene.background = new THREE.Color(skyColors[seasonIndex]);
                scene.fog.color.setHex(skyColors[seasonIndex]);
                if (grassPlane) grassPlane.material.color.setHex(grassColors[seasonIndex]);
            }
        }
        function initControls() {
            const moveLeft = () => { if (currentLaneIndex > 0) currentLaneIndex--; targetX = lanes[currentLaneIndex]; };
            const moveRight = () => { if (currentLaneIndex < 2) currentLaneIndex++; targetX = lanes[currentLaneIndex]; };
            window.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') moveLeft(); if (e.key === 'ArrowRight') moveRight(); });
            window.addEventListener('touchstart', (e) => { if (!gameStarted) return; if (e.touches[0].clientX < window.innerWidth / 2) moveLeft(); else moveRight(); });
        }
        window.onload = init3D;
    </script>
</body>
</html>
