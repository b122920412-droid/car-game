<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 終極音效版</title>
    <style>
        html, body { margin: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; text-align: center; color: white; z-index: 100; top: 20px; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #0066cc; border: none; color: white; border-radius: 8px; font-weight: bold; }
        #scoreContainer { position: absolute; top: 20px; right: 20px; text-align: right; z-index: 150; }
        #scoreDisplay { font-size: 48px; color: #00ff00; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px #00ff00; }
        #mobile-ui { position: absolute; width: 100%; top: 50px; text-align: center; color: white; display: none; z-index: 200; }
        .sensor-btn { padding: 25px; background: #28a745; color: white; border-radius: 20px; width: 80%; font-size: 24px; border: none; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn" class="btn">開始挑戰 (包含音樂音效)</button>
    </div>

    <div id="scoreContainer">
        <div id="scoreDisplay">00000</div>
    </div>

    <div id="mobile-ui">
        <h2>AI 手機遙控模式</h2>
        <button id="sensorBtn" class="sensor-btn">啟動體感控制</button>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], lanes = [-2.5, 0, 2.5];
        let targetX = 0; // 車子目標位置

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobile) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('sensorBtn').onclick = () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') startSensor(); });
                } else { startSensor(); }
            };
        } else {
            document.getElementById('startBtn').onclick = () => {
                if (!gameStarted) {
                    gameStarted = true;
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('bgm').play(); // 播放音樂
                    initGame();
                    animate();
                    setInterval(createObstacle, 1000);
                    setInterval(() => { if(gameStarted) { score++; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); } }, 100);
                }
            };
        }

        function startSensor() {
            window.addEventListener('deviceorientation', (e) => set(tiltRef, Math.round(e.gamma)));
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 50);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            car = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.7, 2.5), new THREE.MeshPhongMaterial({ color: 0x0077ff }));
            car.position.set(0, 0.35, 5);
            scene.add(car);

            scene.add(new THREE.AmbientLight(0x404040));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7.5);
            scene.add(light);

            camera.position.set(0, 4, 11);
            camera.lookAt(0, 1, 0);

            // 雲端監聽：更新目標位置 (使用遲滯區間，解決跳格)
            onValue(tiltRef, (s) => {
                const t = s.val() || 0;
                if (t < -18) targetX = lanes[0];
                else if (t > 18) targetX = lanes[2];
                else targetX = lanes[1];
            });

            // 鍵盤控制
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') targetX = lanes[0];
                if (e.key === 'ArrowRight') targetX = lanes[2];
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') targetX = lanes[1];
            });
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 1), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.5, -40);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);

            // 修正：車子平滑移動 (Lerp)，這會讓車子「滑過」中間區域，而不是直接閃現
            car.position.x += (targetX - car.position.x) * 0.15;

            obstacles.forEach((obs, i) => {
                obs.position.z += 0.8;
                // 碰撞偵測
                if (obs.position.z > car.position.z - 0.5 && obs.position.z < car.position.z + 0.5 && Math.abs(obs.position.x - obs.position.x) < 1.2 && Math.abs(car.position.x - obs.position.x) < 1) {
                    gameStarted = false;
                    document.getElementById('crashSound').play(); // 播放撞車聲
                    document.getElementById('bgm').pause();
                    setTimeout(() => { alert("遊戲結束！總分：" + score); location.reload(); }, 200);
                }
                if (obs.position.z > 15) { scene.remove(obs); obstacles.splice(i, 1);
