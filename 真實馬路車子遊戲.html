<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲 - 趣味進階版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .btn { padding: 18px 35px; font-size: 20px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,123,255,0.4); width: 240px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        
        /* UI 豐富化 */
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 100; }
        #scoreDisplay { font-size: 36px; color: #0f0; font-family: monospace; font-weight: bold; text-shadow: 0 0 15px #0f0; float: right; }
        #hp-bar-container { width: 200px; height: 20px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #ff3333; transition: 0.3s; }
        #speedo { color: #00d2ff; font-size: 18px; margin-top: 10px; font-weight: bold; }
        
        .title { color: white; font-size: 48px; margin-bottom: 5px; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 20px #007bff; }
        .hint { color: #777; font-size: 14px; margin-top: 25px; line-height: 1.8; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="title">TURBO RACER</div>
        <div style="color: #00ffcc; letter-spacing: 2px;">TECH INNOVATION PROJECT</div>
        <div class="btn-group">
            <button class="btn" onclick="setupControl('touch')">📱 螢幕點擊模式</button>
            <button class="btn" onclick="setupControl('tilt')" style="background: linear-gradient(135deg, #6f42c1, #e83e8c);">🌀 手機體感模式</button>
        </div>
        <div class="hint">躲避紅色障礙，收集黃金閃電獲得無敵！</div>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
        <div id="speedo">SPEED: 0 km/h</div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
    <audio id="powerupSound" src="https://actions.google.com/sounds/v1/foley/glass_ping.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, gameStarted = false, score = 0;
        let obstacles = [], trees = [], items = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.5, hp = 100, isInvincible = false;
        let controlType = 'touch';

        function setupControl(type) {
            controlType = type;
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.3;
            bgm.play().catch(() => {});
            if (type === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        }

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            init3D();
            initControls();
            animate();
            
            // 分數與難度提升
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = `SPEED: ${Math.floor(currentSpeed * 40)} km/h`;
                    if (score % 100 === 0 && currentSpeed < 5) currentSpeed += 0.15;
                }
            }, 100);

            // 多元化障礙物產生
            setInterval(createObstacle, 1000); 
            // 道具產生
            setInterval(createItem, 5000);
            setInterval(createTree, 1200);
        }

        function initControls() {
            if (controlType === 'touch') {
                window.addEventListener('touchstart', (e) => {
                    if (e.touches[0].clientX < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                    else { if (currentLaneIndex < 2) currentLaneIndex++; }
                    targetX = lanes[currentLaneIndex];
                });
            } else if (controlType === 'tilt') {
                window.addEventListener('deviceorientation', (e) => {
                    const tilt = e.gamma; 
                    if (tilt < -10) currentLaneIndex = 0;
                    else if (tilt > 10) currentLaneIndex = 2;
                    else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 30, 120);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // 路面
            const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 2000), new THREE.MeshPhongMaterial({ color: 0x151515 }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 標線
            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 7), new THREE.MeshBasicMaterial({ color: 0x555555 }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-1.75, 0.05, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.75; scene.add(line2); roadLines.push(line2);
            }

            // 賽車
            car = new THREE.Group();
            const carMat = new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0xffffff, shininess: 100 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.5), carMat);
            body.position.y = 0.5; car.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 1.6), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            cabin.position.set(0, 1, -0.3); car.add(cabin);
            
            scene.add(car); car.position.z = 15;

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const light = new THREE.PointLight(0x007bff, 1);
            light.position.set(0, 10, 20);
            scene.add(light);

            camera.position.set(0, 8, 28);
            camera.lookAt(0, 2, 0);
        }

        // 障礙物多元化：加入移動型障礙物
        function createObstacle() {
            if (!gameStarted) return;
            const isMoving = Math.random() > 0.7; // 30% 機率是移動障礙物
            const obsGeo = isMoving ? new THREE.CylinderGeometry(1, 1, 2, 16) : new THREE.BoxGeometry(2.2, 1.5, 2.5);
            const obsMat = new THREE.MeshPhongMaterial({ color: isMoving ? 0xffaa00 : 0xcc3333 });
            const obs = new THREE.Mesh(obsGeo, obsMat);
            
            obs.userData = { 
                isMoving: isMoving, 
                dir: Math.random() > 0.5 ? 1 : -1,
                lane: Math.floor(Math.random() * 3)
            };
            obs.position.set(lanes[obs.userData.lane], 0.75, -120);
            scene.add(obs); obstacles.push(obs);
        }

        // 道具系統：無敵閃電
        function createItem() {
            if (!gameStarted) return;
            const itemGeo = new THREE.IcosahedronGeometry(0.8, 0);
            const itemMat = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0xaaaa00 });
            const item = new THREE.Mesh(itemGeo, itemMat);
            item.position.set(lanes[Math.floor(Math.random() * lanes.length)], 1, -120);
            scene.add(item); items.push(item);
        }

        function createTree() {
            if (!gameStarted) return;
            [-15, 15].forEach(x => {
                const tree = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 1), new THREE.MeshBasicMaterial({ color: 0x222222 }));
                tree.position.set(x + (Math.random()*4), 5, -120);
                scene.add(tree); trees.push(tree);
            });
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            
            // 平滑移動
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1;
            car.rotation.z = (targetX - car.position.x) * 0.05;

            // 無敵特效
            if (isInvincible) {
                car.children[0].material.emissive.setHex(0xffaa00 * (Math.sin(Date.now()*0.02)*0.5 + 0.5));
            } else {
                car.children[0].material.emissive.setHex(0x000000);
            }

            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 40) l.position.z = -200; });
            trees.forEach((t, i) => { t.position.z += currentSpeed; if(t.position.z > 40) { scene.remove(t); trees.splice(i, 1); } });
            
            // 障礙物邏輯
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (obs.userData.isMoving) {
                    obs.position.x += Math.sin(Date.now() * 0.005) * 0.05;
                }
                
                // 碰撞判定
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.6) {
                    if (!isInvincible) {
                        hp -= 2; // 碰撞扣血
                        document.getElementById('hp-bar').style.width = hp + "%";
                        document.getElementById('crashSound').play();
                        scene.remove(obs); obstacles.splice(i, 1);
                        if (hp <= 0) {
                            gameStarted = false;
                            setTimeout(() => { alert("💥 賽車毀損！最終得分: " + score); location.reload(); }, 200);
                        }
                    }
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });

            // 道具邏輯
            items.forEach((item, i) => {
                item.position.z += currentSpeed;
                item.rotation.y += 0.1;
                if (Math.abs(car.position.z - item.position.z) < 2 && Math.abs(car.position.x - item.position.x) < 1.5) {
                    isInvincible = true;
                    document.getElementById('powerupSound').play();
                    scene.remove(item); items.splice(i, 1);
                    setTimeout(() => { isInvincible = false; }, 3000); // 無敵 3 秒
                }
                if (item.position.z > 40) { scene.remove(item); items.splice(i, 1); }
            });

            renderer.render(scene, camera);
        }
    </script>
