<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 精緻豪華版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* 修正 UI 層次 */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; background: rgba(0,0,0,0.7); }
        .btn { padding: 20px 50px; font-size: 28px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,123,255,0.4); transition: transform 0.2s; pointer-events: auto; }
        .btn:active { transform: scale(0.95); }
        
        #scoreDisplay { position: absolute; top: 20px; right: 30px; font-size: 60px; color: #00ff00; font-family: 'Courier New', monospace; font-weight: bold; text-shadow: 0 0 20px #00ff00; z-index: 100; pointer-events: none; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn" class="btn">開始遊戲</button>
        <p style="color: #888; margin-top: 20px;">手機/鍵盤 皆可控制 (建議開啟音量)</p>
    </div>

    <div id="scoreDisplay">00000</div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], targetX = 0;

        // --- 初始化 3D 環境 ---
        function initGame() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 20, 100);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 精緻馬路
            const road = new THREE.Mesh(new THREE.PlaneGeometry(15, 2000), new THREE.MeshPhongMaterial({ color: 0x1a1a1a }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 車道分欄線 (動態)
            for (let i = 0; i < 120; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 4), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-1.8, 0.02, -i * 15);
                scene.add(line);
                roadLines.push(line);
                const line2 = line.clone();
                line2.position.x = 1.8;
                scene.add(line2);
                roadLines.push(line2);
            }

            // --- 精緻車子構造 ---
            car = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x007bff, shininess: 100 });
            const mainBody = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.5), bodyMat);
            mainBody.position.y = 0.4;
            car.add(mainBody);
            
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.5), new THREE.MeshPhongMaterial({ color: 0x003399 }));
            cabin.position.set(0, 0.9, -0.3);
            car.add(cabin);

            // 輪胎
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 20);
            const wheelMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            [-1, 1].forEach(xSide => {
                [-1, 1].forEach(zSide => {
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(xSide * 0.9, 0.35, zSide * 1.2);
                    car.add(wheel);
                });
            });
            
            scene.add(car);
            car.position.z = 10;

            // 燈光
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 15, 10);
            scene.add(sun);

            camera.position.set(0, 6, 22);
            camera.lookAt(0, 1, 0);
        }

        // --- 啟動按鈕 ---
        document.getElementById('startBtn').addEventListener('click', () => {
            gameStarted = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgm').play();
            initGame();
            animate();
            
            // 計分與障礙物生成
            setInterval(() => { if(gameStarted) { score++; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); } }, 100);
            setInterval(createObstacle, 1100);
        });

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 2), new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x440000 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.75, -80);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);

            // 車子緩動 (Lerp) - 解決跳格，保證經過中間
            car.position.x += (targetX - car.position.x) * 0.12;

            // 馬路流動
            roadLines.forEach(l => {
                l.position.z += 1.5;
                if(l.position.z > 30) l.position.z = -1500;
            });

            obstacles.forEach((obs, i) => {
                obs.position.z += 1.2;
                // 精確碰撞偵測
                const dx = Math.abs(car.position.x - obs.position.x);
                const dz = Math.abs(car.position.z - obs.position.z);
                if (dz < 2.0 && dx < 1.5) {
                    gameStarted = false;
                    document.getElementById('crashSound').play();
                    document.getElementById('bgm').pause();
                    setTimeout(() => { alert("Game Over! Score: " + score); location.reload(); }, 200);
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }

        // --- 控制輸入 ---
        // 1. 手機雲端輸入 (擴大中間車道範圍解決跳格)
        onValue(tiltRef, (s) => {
            const t = s.val() || 0;
            if (t < -20) targetX = lanes[0];      // 往左斜超過 20 度
            else if (t > 20) targetX = lanes[2]; // 往右斜超過 20 度
            else targetX = lanes[1];             // 中間範圍極大化
        });

        // 2. 鍵盤輸入
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') targetX = lanes[0];
            if (e.key === 'ArrowRight') targetX = lanes[2];
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') targetX = lanes[1];
        });

        // 處理視窗縮放
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
