<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲 - 強化版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .btn { padding: 18px 35px; font-size: 20px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,123,255,0.4); width: 220px; }
        #scoreDisplay { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #0f0; font-family: monospace; font-weight: bold; z-index: 100; text-shadow: 0 0 10px #0f0; }
        .title { color: white; font-size: 36px; margin-bottom: 5px; font-weight: 900; letter-spacing: 2px; }
        .hint { color: #555; font-size: 14px; margin-top: 25px; line-height: 1.8; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="title">賽車小遊戲</div>
        <div style="color: #aaa;">選擇操作方式開始挑戰</div>
        <div class="btn-group">
            <button class="btn" onclick="setupControl('touch')">📱 螢幕點擊</button>
            <button class="btn" onclick="setupControl('tilt')" style="background: linear-gradient(135deg, #6f42c1, #e83e8c);">🌀 手機體感</button>
        </div>
        <div class="hint">⌨️ 電腦玩家：使用方向鍵<br>📱 手機玩家：傾斜或點擊兩側</div>
    </div>

    <div id="scoreDisplay">00000</div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, gameStarted = false, score = 0;
        let obstacles = [], trees = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.5; 
        let controlType = 'touch';

        function setupControl(type) {
            controlType = type;
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.4;
            bgm.play().catch(() => {});
            if (type === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        }

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            init3D();
            initControls();
            animate();
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    if (score % 50 === 0 && currentSpeed < 5) currentSpeed += 0.2;
                }
            }, 100);
            setInterval(createObstacle, 900); 
            setInterval(createTree, 1500);
        }

        function initControls() {
            if (controlType === 'touch') {
                window.addEventListener('touchstart', (e) => {
                    if (e.touches[0].clientX < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                    else { if (currentLaneIndex < 2) currentLaneIndex++; }
                    targetX = lanes[currentLaneIndex];
                });
            } else if (controlType === 'tilt') {
                window.addEventListener('deviceorientation', (e) => {
                    const tilt = e.gamma; 
                    if (tilt < -12) currentLaneIndex = 0;
                    else if (tilt > 12) currentLaneIndex = 2;
                    else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
        }

        function init3D() {
            scene = new THREE.Scene();
            // 💡 強化迷霧效果 (Fog)
            scene.fog = new THREE.Fog(0x000000, 20, 100);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 💡 開啟陰影與光亮補償
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // 路面
            const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 2000), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 標線
            for (let i = 0; i < 50; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-1.75, 0.05, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.75; scene.add(line2); roadLines.push(line2);
            }

            // 💡 強化賽車模型與材質 (Phong Material)
            car = new THREE.Group();
            const carMat = new THREE.MeshPhongMaterial({ 
                color: 0x007bff, 
                specular: 0x555555, 
                shininess: 150 
            });
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.55, 3.5), carMat);
            body.position.y = 0.5; car.add(body);
            
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.45, 1.5), new THREE.MeshPhongMaterial({ color: 0x050505, shininess: 200 }));
            cabin.position.set(0, 1, -0.3); car.add(cabin);

            // 輪胎
            const wGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.45, 24);
            const wMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            [[-0.9,0.38,-1.2],[0.9,0.38,-1.2],[-0.9,0.38,1.2],[0.9,0.38,1.2]].forEach(p => {
                const w = new THREE.Mesh(wGeo, wMat); w.rotation.z = Math.PI/2; w.position.set(p[0],p[1],p[2]); car.add(w);
            });
            
            scene.add(car); car.position.z = 12;

            // 💡 燈光佈局升級
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const spotLight = new THREE.SpotLight(0xffffff, 1.2);
            spotLight.position.set(0, 20, 20);
            spotLight.castShadow = true;
            scene.add(spotLight);

            camera.position.set(0, 7, 25);
            camera.lookAt(0, 1, 0);
        }

        function createTree() {
            if (!gameStarted) return;
            [-12, 12].forEach(x => {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 2.5), new THREE.MeshPhongMaterial({ color: 0x4a2c10 }));
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 12), new THREE.MeshPhongMaterial({ color: 0x1a4a1a, shininess: 5 }));
                leaves.position.y = 3; trunk.position.y = 1; tree.add(trunk, leaves);
                tree.position.set(x, 0, -120); scene.add(tree); trees.push(tree);
            });
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.5, 2.8), new THREE.MeshPhongMaterial({ color: 0xcc3333, shininess: 80 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.75, -100);
            scene.add(obs); obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            // 輕微車身晃動模擬
            car.rotation.y = (targetX - car.position.x) * 0.05;
            
            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 40) l.position.z = -200; });
            trees.forEach((t, i) => { t.position.z += currentSpeed; if(t.position.z > 40) { scene.remove(t); trees.splice(i, 1); } });
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.7) {
                    gameStarted = false; document.getElementById('crashSound').play();
                    setTimeout(() => { alert("💥 遊戲結束！得分: " + score); location.reload(); }, 200);
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
