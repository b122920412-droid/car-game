<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 最終修復版</title>
    <style>
        html, body { margin: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; }
        #pc-ui, #mobile-ui { position: absolute; width: 100%; text-align: center; color: white; z-index: 100; }
        #pc-ui { top: 20px; }
        #mobile-ui { top: 50px; display: none; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #0066cc; border: none; color: white; border-radius: 8px; font-weight: bold; }
        .sensor-btn { padding: 25px; background: #28a745; color: white; border: none; border-radius: 20px; width: 80%; font-size: 24px; }
        #score { font-size: 24px; margin-top: 10px; text-shadow: 2px 2px 4px #000; }
        #angle { font-size: 80px; color: #00ff00; margin: 50px 0; }
    </style>
</head>
<body>

    <div id="pc-ui">
        <button id="startBtn" class="btn">開始遊戲 (鍵盤或手機皆可控)</button>
        <div id="score">分數：0</div>
    </div>

    <div id="mobile-ui">
        <h2>AI 手機遙控模式</h2>
        <button id="sensorBtn" class="sensor-btn">啟動體感控制</button>
        <div id="angle">0°</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');

        // 判斷裝置
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], lanes = [-2, 0, 2];

        if (isMobile) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('pc-ui').style.display = 'none';
            document.getElementById('sensorBtn').onclick = () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') startSensor(); });
                } else { startSensor(); }
            };
        } else {
            document.getElementById('pc-ui').style.display = 'block';
            document.getElementById('startBtn').onclick = () => {
                gameStarted = true;
                document.getElementById('pc-ui').style.display = 'none';
                initGame();
                animate();
                setInterval(createObstacle, 1000);
            };
        }

        function startSensor() {
            window.addEventListener('deviceorientation', (e) => {
                let tilt = Math.round(e.gamma);
                document.getElementById('angle').innerText = tilt + "°";
                set(tiltRef, tilt);
            });
        }

        function initGame() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 建立 3D 路面
            const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 建立 3D 車子
            car = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2), new THREE.MeshPhongMaterial({ color: 0x0077ff }));
            car.position.set(0, 0.3, 5);
            scene.add(car);

            // 燈光
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7.5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.set(0, 5, 12);
            camera.lookAt(0, 0, 0);

            // 鍵盤監聽
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') car.position.x = lanes[0];
                if (e.key === 'ArrowRight') car.position.x = lanes[2];
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') car.position.x = lanes[1];
            });

            // 雲端監聽
            onValue(tiltRef, (snapshot) => {
                const tilt = snapshot.val() || 0;
                if (tilt < -15) car.position.x = lanes[0];
                else if (tilt > 15) car.position.x = lanes[2];
                else car.position.x = lanes[1];
            });
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.5, -50);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            obstacles.forEach((obs, i) => {
                obs.position.z += 0.8;
                if (obs.position.z > car.position.z - 0.5 && obs.position
