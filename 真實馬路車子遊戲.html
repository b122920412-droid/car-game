<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 終極完成版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); }
        .btn { padding: 25px 60px; font-size: 30px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; }
        #scoreDisplay { position: absolute; top: 20px; right: 30px; font-size: 50px; color: #00ff00; font-family: monospace; z-index: 100; }
        
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 2000; background: #111; color: white; text-align: center; }
        .touch-zone { position: absolute; top: 0; width: 50%; height: 100%; z-index: 2005; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn" class="btn">開始挑戰 (電腦點此)</button>
    </div>

    <div id="scoreDisplay">00000</div>

    <div id="mobile-ui">
        <div style="margin-top: 40vh;">
            <button id="sensorBtn" class="btn" style="position: relative; z-index: 2010;">連線遙控器</button>
            <p id="status" style="color: #888; margin-top: 20px;">點擊上方按鈕後即可操控</p>
        </div>
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            databaseURL: "https://ai-car-game-default-rtdb.firebaseio.com/", 
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');
        const moveRef = ref(db, 'car/move');

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('overlay').style.display = 'none';

            // 修正：手機按鈕點擊
            const sBtn = document.getElementById('sensorBtn');
            const status = document.getElementById('status');

            sBtn.onclick = function() {
                if (window.navigator.vibrate) window.navigator.vibrate(50); // 震動回饋
                status.innerText = "連線成功！點擊左右螢幕移動";
                sBtn.style.background = "#28a745";
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') startSensor(); });
                } else { startSensor(); }
            };

            // 修正：觸控判定
            document.getElementById('left-zone').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (window.navigator.vibrate) window.navigator.vibrate(30);
                set(moveRef, Date.now() + "_-1");
            });
            document.getElementById('right-zone').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (window.navigator.vibrate) window.navigator.vibrate(30);
                set(moveRef, Date.now() + "_1");
            });
        }

        function startSensor() {
            window.addEventListener('deviceorientation', (e) => {
                set(tiltRef, Math.round(e.gamma));
            });
        }

        // 電腦端開始
        document.getElementById('startBtn').onclick = () => {
            gameStarted = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgm').play();
            init3D();
            animate();
            onValue(tiltRef, (s) => {
                const t = s.val() || 0;
                if (t < -20) currentLaneIndex = 0; else if (t > 20) currentLaneIndex = 2; else currentLaneIndex = 1;
                targetX = lanes[currentLaneIndex];
            });
            onValue(moveRef, (s) => {
                const val = s.val() || "";
                const dir = parseInt(val.split("_")[1]);
                if (dir === -1 && currentLaneIndex > 0) currentLaneIndex--;
                if (dir === 1 && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
            setInterval(() => { if(gameStarted) { score++; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); } }, 100);
            setInterval(createObstacle, 1100);
        };

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 30, 110);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(16, 2000), new THREE.MeshPhongMaterial({ color: 0x151515 })).rotateX(-Math.PI/2));
            car = new THREE.Group();
            car.add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 3.6), new THREE.MeshPhongMaterial({ color: 0x0077ff })));
            scene.add(car); car.position.set(0, 0.5, 10);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 15, 15); scene.add(sun);
            camera.position.set(0, 6, 24); camera.lookAt(0, 1, 0);
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 2.5), new THREE.MeshPhongMaterial({ color: 0xff4444 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.75, -120);
            scene.add(obs); obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            obstacles.forEach((obs, i) => {
                obs.position.z += 1.7;
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.6) {
                    gameStarted = false; location.reload();
                }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
