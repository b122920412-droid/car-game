<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; color: white; }
        .title { font-size: 42px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px #007bff; margin-bottom: 25px; }
        .setting-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; width: 340px; margin-bottom: 15px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .setting-header { color: #00d2ff; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .opt-btn { padding: 8px 18px; border: 1px solid #007bff; background: transparent; color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 10px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 18px 50px; font-size: 24px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,123,255,0.5); }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 100; }
        #scoreDisplay { font-size: 32px; color: #0f0; font-family: monospace; font-weight: bold; float: right; text-shadow: 0 0 10px #0f0; }
        #hp-container { width: 180px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 8px; overflow: hidden; display: none; margin-bottom: 5px; }
        #hp-bar { width: 100%; height: 100%; background: #ff3333; transition: 0.3s; }
        #speedo { color: #fff; font-size: 18px; font-weight: bold; clear: both; float: right; margin-top: 5px; font-family: monospace; }
        .hint { color: #666; font-size: 12px; margin-top: 20px; line-height: 1.6; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); display: none; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>
    <div id="damage-flash"></div>
    <div id="start-screen">
        <div class="title">賽車小遊戲</div>
        
        <div class="setting-card">
            <div class="setting-header">🕹️ 操作模式</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤 / 點擊模式</button>
                <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">體感模式</button>
            </div>
        </div>

        <div class="setting-card">
            <div class="setting-header">🛡️ 挑戰難度</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
            </div>
        </div>

        <div class="setting-card">
            <div class="setting-header">🔥 遊戲模式</div>
            <div class="option-group">
                <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 極限 (一撞即死)</button>
                <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ 休閒 (有HP)</button>
            </div>
        </div>

        <button class="start-btn" onclick="requestAndStart()">進入賽道</button>
        <div class="hint">⌨️ 電腦：左右方向鍵 / 📱 手機：點擊螢幕兩側或傾斜</div>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="speedo">0 KM/H</div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
    <audio id="powerupSound" src="https://actions.google.com/sounds/v1/foley/glass_ping.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, grassPlane, gameStarted = false, score = 0;
        let obstacles = [], decor = [], roadLines = [], particles = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.6, hp = 100, isInvincible = false;
        let settings = { ctrl: 'touch', mode: 'hard', diff: 1 };

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        function requestAndStart() {
            const bgm = document.getElementById('bgm');
            const clang = document.getElementById('crashSound');
            bgm.volume = 0.2; bgm.play().catch(() => {});
            clang.play().then(() => { clang.pause(); clang.currentTime = 0; }).catch(() => {});

            if (settings.ctrl === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        }

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            if (settings.mode === 'easy') document.getElementById('hp-container').style.display = 'block';
            currentSpeed = 1.0 + (settings.diff * 0.5); 
            init3D(); initControls(); animate();
            
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = `${Math.floor(currentSpeed * 50)} KM/H`;
                    if (score % 70 === 0 && currentSpeed < 9) currentSpeed += (0.12 * settings.diff);
                    updateSeasons(); 
                }
            }, 100);
            setInterval(createObstacle, 1000 - (settings.diff * 120));
            setInterval(createItem, 8000);
            setInterval(createDecor, 800); // 💡 每800毫秒生成一棵樹
        }

        function updateSeasons() {
            const seasonIndex = Math.floor(score / 150) % 4; // 💡 縮短四季切換分數
            const fogColors = [0xbbdefb, 0xfff9c4, 0xffcc80, 0xd1d9e6]; // 春(藍)、夏(黃)、秋(暖橙)、冬(灰白)
            const clearColors = [0x90caf9, 0xfff59d, 0xffb74d, 0xbdc9d8]; // 冬天背景明亮
            const grassColors = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff]; // 嫩綠、深綠、金黃、雪白

            scene.fog.color.setHex(fogColors[seasonIndex]);
            renderer.setClearColor(clearColors[seasonIndex]);
            if (grassPlane) grassPlane.material.color.setHex(grassColors[seasonIndex]);
        }

        function initControls() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
            if (settings.ctrl === 'touch') {
                window.addEventListener('touchstart', (e) => {
                    if (e.touches[0].clientX < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                    else { if (currentLaneIndex < 2) currentLaneIndex++; }
                    targetX = lanes[currentLaneIndex];
                });
            } else {
                window.addEventListener('deviceorientation', (e) => {
                    const tilt = e.gamma; 
                    if (tilt < -10) currentLaneIndex = 0; else if (tilt > 10) currentLaneIndex = 2; else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xbbdefb, 30, 110);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            const grassGeo = new THREE.PlaneGeometry(2000, 2000);
            const grassMat = new THREE.MeshPhongMaterial({ color: 0x7cfc00 });
            grassPlane = new THREE.Mesh(grassGeo, grassMat);
            grassPlane.rotation.x = -Math.PI / 2;
            grassPlane.position.y = -0.1; scene.add(grassPlane);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x111111, specular: 0x555555 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);

            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 8), new THREE.MeshBasicMaterial({ color: 0x444444 }));
                line.rotation.x = -Math.PI / 2; line.position.set(-1.8, 0.06, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.8; scene.add(line2); roadLines.push(line2);
            }

            car = new THREE.Group();
            const carMat = new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0xffffff, shininess: 100 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 3.8), carMat);
            body.position.y = 0.5; car.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.8), new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 200 }));
            cabin.position.set(0, 1.0, -0.3); car.add(cabin);
            const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.6, 24);
            const wMat = new THREE.MeshPhongMaterial({ color: 0x050505 });
            [[-1,0.45,-1.4],[1,0.45,-1.4],[-1,0.45,1.4],[1,0.45,1.4]].forEach(p => {
                const w = new THREE.Mesh(wGeo, wMat); w.rotation.z = Math.PI/2; w.position.set(p[0],p[1],p[2]); car.add(w);
            });
            scene.add(car); car.position.z = 15;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.PointLight(0xffffff, 1.5); light.position.set(0, 20, 10); scene.add(light);
            camera.position.set(0, 9, 30); camera.lookAt(0, 2, 0);
        }

        function createObstacle() {
            if (!gameStarted) return;
            const type = Math.random(); let obs;
            const obsMat = new THREE.MeshPhongMaterial({ color: 0xcc3333, specular: 0xffffff, shininess: 80 });
            // 💡 使用幾何組合製作立體障礙物
            if (type < 0.3) { 
                obs = new THREE.Group();
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 2, 16), new THREE.MeshPhongMaterial({ color: 0x333333 }));
                const stripe = new THREE.Mesh(new THREE.TorusGeometry(0.72, 0.08, 6, 16), new THREE.MeshPhongMaterial({ color: 0xffffff }));
                stripe.rotation.x = Math.PI / 2; barrel.add(stripe);
                obs.add(barrel); obs.position.y = 1.0;
            } else if (type < 0.6) { 
                obs = new THREE.Group();
                const boxL = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 3), obsMat);
                const boxR = boxL.clone(); boxR.position.x = 2.5; obs.add(boxL, boxR); obs.position.y = 0.75;
            } else { 
                obs = new THREE.Group();
                const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
                const baseGeo = new THREE.BoxGeometry(1, 0.2, 1);
                const bannerGeo = new THREE.PlaneGeometry(3.5, 1.2);
                const poleMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });
                const bannerMat = new THREE.MeshPhongMaterial({ color: 0xffffff, map: null, side: THREE.DoubleSide });
                const base = new THREE.Mesh(baseGeo, poleMat);
                const pole = new THREE.Mesh(poleGeo, poleMat); pole.position.y = 2; base.add(pole);
                const banner = new THREE.Mesh(bannerGeo, bannerMat); banner.position.y = 2.8; base.add(banner);
                obs.add(base); obs.position.y = 0.1;
            }
            obs.position.set(lanes[Math.floor(Math.random() * 3)], obs.position.y, -120);
            scene.add(obs); obstacles.push(obs);
        }

        // 💡 樹木生成系統：取代原本的白色圓柱體
        function createDecor() {
            if (!gameStarted) return;
            const seasonIndex = Math.floor(score / 150) % 4; // 💡 縮短四季切換分數
            const side = Math.random() > 0.5 ? 1 : -1;
            const xBase = side * 15;
            
            // 使用 Group 組合 3D 立體樹木模型
            let d = new THREE.Group();
            
            // 樹幹材質
            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x4a2c10, shininess: 2 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 8, 16), trunkMat);
            trunk.position.y = 4;
            
            // 樹冠材質 (春嫩綠、夏深綠、秋枯黃、冬雪白)
            let foliageMat;
            if (seasonIndex === 0) foliageMat = new THREE.MeshPhongMaterial({ color: 0xffc1e3 }); // 春：櫻花粉
            else if (seasonIndex === 1) foliageMat = new THREE.MeshPhongMaterial({ color: 0x1a4a1a }); // 夏：茂盛綠
            else if (seasonIndex === 2) foliageMat = new THREE.MeshPhongMaterial({ color: 0xd84315 }); // 秋：紅楓
            else foliageMat = new THREE.MeshPhongMaterial({ color: 0xcccccc }); // 冬：枯樹 (不生成葉子)

            // 如果不是冬天，生成樹冠幾何體
            if (seasonIndex !== 3) {
                const foliage = new THREE.Mesh(new THREE.SphereGeometry(2, 16, 12), foliageMat);
                foliage.position.y = 5;
                d.add(foliage);
            }
            d.add(trunk);
            
            // 隨機角度與位置
            d.position.set(xBase + (Math.random()*5), 0, -120);
            scene.add(d); decor.push(d);
        }

        function createItem() {
            if (!gameStarted) return;
            const item = new THREE.Mesh(new THREE.IcosahedronGeometry(1.2), new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, shininess: 100 }));
            item.position.set(lanes[Math.floor(Math.random() * 3)], 1.5, -120);
            scene.add(item); items.push(item);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1;
            car.rotation.z = (targetX - car.position.x) * -0.05;

            if (score % 2 === 0) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 }));
                p.position.set(car.position.x + (Math.random()-0.5)*0.5, 0.5, car.position.z + 2.1);
                scene.add(p); particles.push({ mesh: p, life: 1.0 });
            }
            particles.forEach((p, i) => {
                p.mesh.position.z += 1.5; p.mesh.scale.multiplyScalar(0.92); p.life -= 0.05;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            });

            // 無敵閃爍
            if (isInvincible) { car.children.forEach(c => { if(c.material && c.material.emissive) c.material.emissive.setHex(0x00ffff); }); }
            else { if(car.children[0].material.emissive) car.children[0].material.emissive.setHex(0x000000); }

            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 45) l.position.z = -220; });
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 45) { scene.remove(d); decor.splice(i, 1); } });
            
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.8) {
                    if (!isInvincible) {
                        const boom = document.getElementById('crashSound');
                        boom.currentTime = 0; boom.play();
                        if (settings.mode === 'hard') {
                            gameStarted = false;
                            setTimeout(() => { alert("🚀 任務失敗！得分: " + score); location.reload(); }, 200);
                        } else {
                            hp -= 25; document.getElementById('hp-bar').style.width = hp + "%";
                            document.getElementById('damage-flash').style.display = 'block';
                            setTimeout(() => { document.getElementById('damage-flash').style.display = 'none'; }, 150);
                            scene.remove(obs); obstacles.splice(i, 1);
                            if (hp <= 0) { gameStarted = false; setTimeout(() => { alert("💔 引擎損毀！最終得分: " + score); location.reload(); }, 200); }
                        }
                    }
                }
                if (obs.position.z > 45) { scene.remove(obs); obstacles.splice(i, 1); }
            });

            items.forEach((item, i) => {
                item.position.z += currentSpeed; item.rotation.y += 0.2;
                if (Math.abs(car.position.z - item.position.z) < 2.5 && Math.abs(car.position.x - item.position.x) < 1.8) {
                    isInvincible = true; document.getElementById('powerupSound').play();
                    scene.remove(item); items.splice(i, 1); setTimeout(() => { isInvincible = false; }, 4000);
                }
                if (item.position.z > 45) { scene.remove(item); items.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
