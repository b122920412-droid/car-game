<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亡命飆速 - 系統解鎖與路燈優化版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #0b0b1a; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3a, #050510); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; color: white; text-align: center; }
        .title { font-size: 56px; font-weight: 900; letter-spacing: 6px; color: #fff; text-shadow: 0 0 30px #007bff; margin: 0; }
        .warning-text { color: #ff4444; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; animation: blink 1.2s infinite; font-size: 20px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .setting-group { margin: 10px 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; width: 340px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .setting-label { font-size: 14px; color: #00d2ff; margin-bottom: 10px; font-weight: bold; }
        .option-group { display: flex; gap: 12px; }
        .opt-btn { padding: 10px 22px; border: 1px solid #007bff; background: rgba(0, 123, 255, 0.1); color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 20px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 20px 80px; font-size: 26px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: 900; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,123,255,0.4); }
        .start-btn:disabled { background: #333; cursor: wait; opacity: 0.6; }
        #ui-layer { position: absolute; top: 25px; left: 25px; right: 25px; pointer-events: none; z-index: 2000; display: none; }
        #scoreDisplay { font-size: 42px; color: #0f0; font-family: monospace; font-weight: bold; float: right; }
    </style>
</head>
<body>
    <audio id="bgm" loop preload="auto"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
    <audio id="crashSound" preload="auto"><source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg"></audio>

    <div id="start-screen">
        <div class="title">亡命飆速</div>
        <div class="warning-text">🚨 警告：前方警方已設下強力路障！</div>
        <div class="setting-group"><div class="setting-label">🕹️ 操作模式</div><div class="option-group">
            <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤 / 觸控</button>
            <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">手機體感</button>
        </div></div>
        <div class="setting-group"><div class="setting-label">🛡️ 挑戰難度</div><div class="option-group">
            <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
            <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
            <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
        </div></div>
        <div class="setting-group"><div class="setting-label">🔥 遊戲模式</div><div class="option-group">
            <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 一撞即死</button>
            <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ 護甲模式</button>
        </div></div>
        <button id="start-btn" class="start-btn" disabled onclick="handleStart()">資源載入中...</button>
    </div>

    <div id="ui-layer"><div id="scoreDisplay">00000</div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, grassPlane, road, gameStarted = false, score = 0;
        let obstacles = [], decor = [], streetLightModel = null;
        let obsCarModels = {}, decorPool = { 0: [], 1: [], 2: [], 3: [] };
        let policeLightR, policeLightB, lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.0, hp = 100, settings = { ctrl: 'touch', mode: 'hard', diff: 1 };
        let loadedCount = 0, totalToLoad = 12;

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        async function handleStart() {
            document.getElementById('bgm').play().catch(e => {});
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            currentSpeed = 0.8 + (settings.diff * 0.4); 
            initControls(); animate();
            setInterval(() => { if(gameStarted) { score++; currentSpeed += 0.002; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); updateSeasons(); } }, 100);
            setInterval(createObstacle, 1000 - (settings.diff * 100)); 
            setInterval(createPairs, 500); 
        }

        function init3D() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 200);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.4));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(10, 50, 10); scene.add(sun);

            road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);
            grassPlane = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0x7cfc00 }));
            grassPlane.rotation.x = -Math.PI / 2; grassPlane.position.y = -0.15; scene.add(grassPlane);

            policeLightR = new THREE.PointLight(0xff0000, 0, 50); policeLightB = new THREE.PointLight(0x0000ff, 0, 50);
            scene.add(policeLightR, policeLightB);

            const loader = new THREE.GLTFLoader();
            loader.load('car.glb', (g) => { car = g.scene; car.scale.set(4.5, 4.5, 4.5); scene.add(car); car.position.z = 15; checkLoaded(); });

            ['car1.glb','car2.glb','car3.glb','car4.glb','car5.glb','car6.glb'].forEach(f => {
                loader.load(f, (g) => { 
                    g.scene.traverse(n => { if(n.isMesh) { n.material.transparent = false; n.material.depthWrite = true; } });
                    obsCarModels[f] = g.scene; checkLoaded(); 
                }, undefined, () => checkLoaded()); // 失敗也增加，防止卡死
            });

            const unpack = (file, indices) => {
                loader.load(file, (gltf) => {
                    gltf.scene.traverse(node => { if (node.isMesh) { const clone = node.clone(); indices.forEach(idx => decorPool[idx].push(clone)); } });
                    checkLoaded();
                });
            };
            unpack('birch_trees_pack__ps1_low_poly.glb', [0, 1]);
            unpack('pine_trees_pack__ps1_low_poly.glb', [2]);
            unpack('snowy_pine_trees_pack__ps1_low_poly.glb', [3]);
            
            // 💡 直接載入新路燈模型
            loader.load('nintendogs_street_light.glb', (g) => { 
                streetLightModel = g.scene;
                checkLoaded(); 
            }, undefined, () => checkLoaded());

            // 💡 強制解鎖按鈕：防止因為資源載入失敗而卡死
            setTimeout(() => {
                const btn = document.getElementById('start-btn');
                if (btn.disabled) { btn.disabled = false; btn.innerText = "進入賽道"; }
            }, 3000);

            camera.position.set(0, 8, 28); camera.lookAt(0, 2, 0);
        }

        function checkLoaded() { loadedCount++; if(loadedCount >= totalToLoad) { document.getElementById('start-btn').disabled = false; document.getElementById('start-btn').innerText = "進入賽道"; } }

        function createObstacle() {
            const keys = Object.keys(obsCarModels); if (!gameStarted || keys.length === 0) return;
            let k = keys[Math.floor(Math.random() * keys.length)];
            let c = obsCarModels[k].clone();
            if(k === 'car6.glb') { c.scale.set(1.8, 1.8, 1.8); c.rotation.y = 0; } 
            else { c.scale.set(3.2, 3.2, 3.2); c.rotation.y = Math.PI / 2; }
            c.position.set(lanes[Math.floor(Math.random() * 3)], 0, -180);
            scene.add(c); obstacles.push(c);
        }

        function createPairs() {
            if (!gameStarted) return;
            const idx = Math.floor(score / 200) % 4;
            // 路燈每 25 分生成一對
            if (score % 25 === 0 && streetLightModel) {
                [-1, 1].forEach(side => {
                    let s = streetLightModel.clone();
                    s.scale.set(0.4, 0.4, 0.4); 
                    s.position.set(side * 9.5, 0, -220); 
                    s.rotation.y = side > 0 ? 0 : Math.PI;
                    scene.add(s); decor.push(s);
                });
            } else if (decorPool[idx].length > 0) {
                if (score % 15 === 0) {
                    const treeBase = decorPool[idx][Math.floor(Math.random() * decorPool[idx].length)];
                    [-1, 1].forEach(side => {
                        let t = treeBase.clone();
                        t.scale.set(0.18, 0.18, 0.18);
                        t.position.set(side * 14.5, 0, -220);
                        scene.add(t); decor.push(t);
                    });
                }
            }
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1 + Math.PI; 
            policeLightR.intensity = (Math.floor(Date.now() / 150) % 2) === 0 ? 80 : 0;
            policeLightB.intensity = (Math.floor(Date.now() / 150) % 2) === 1 ? 80 : 0;
            policeLightR.position.set(car.position.x - 0.7, 4.5, car.position.z);
            policeLightB.position.set(car.position.x + 0.7, 4.5, car.position.z);
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 40) { scene.remove(d); decor.splice(i, 1); }});
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 2.0 && Math.abs(car.position.x - obs.position.x) < 1.5) {
                    document.getElementById('crashSound').play(); endGame();
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
        function endGame() { gameStarted = false; setTimeout(() => { alert("💥 任務結束！得分: " + score); location.reload(); }, 100); }
        function updateSeasons() {
            const idx = Math.floor(score / 200) % 4;
            const sky = [0x87CEEB, 0x00BFFF, 0xFFA500, 0xE0F7FA], grass = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff];
            const roads = [0x333333, 0x222222, 0x444444, 0x111111];
            if(scene) { scene.background.setHex(sky[idx]); scene.fog.color.setHex(sky[idx]); grassPlane.material.color.setHex(grass[idx]); road.material.color.setHex(roads[idx]); }
        }
        function initControls() {
            const l = () => { if (currentLaneIndex > 0) { currentLaneIndex--; targetX = lanes[currentLaneIndex]; } };
            const r = () => { if (currentLaneIndex < 2) { currentLaneIndex++; targetX = lanes[currentLaneIndex]; } };
            window.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') l(); if (e.key === 'ArrowRight') r(); });
            window.addEventListener('touchstart', (e) => { if (!gameStarted) return; if (e.touches[0].clientX < window.innerWidth / 2) l(); else r(); });
        }
        window.onload = init3D;
    </script>
</body>
</html>
