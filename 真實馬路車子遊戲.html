<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 擬真版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); }
        .btn { padding: 25px 60px; font-size: 30px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,123,255,0.4); }
        #scoreDisplay { position: absolute; top: 20px; right: 30px; font-size: 45px; color: #00ff00; font-family: monospace; font-weight: bold; text-shadow: 0 0 15px #00ff00; z-index: 100; }
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 2000; background: #111; color: white; text-align: center; }
        .touch-zone { position: absolute; top: 0; width: 50%; height: 100%; z-index: 2005; }
        #left-zone { left: 0; } #right-zone { right: 0; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn" class="btn">開始挑戰 (電腦點此)</button>
        <p style="color: #aaa; margin-top: 20px;">使用鍵盤左右鍵 或 手機遙控</p>
    </div>

    <div id="scoreDisplay">00000</div>

    <div id="mobile-ui">
        <div style="margin-top: 40vh;"><button id="sensorBtn" class="btn" style="background:#28a745">啟動遙控器</button></div>
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase 配置 (保持不變)
        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            databaseURL: "https://ai-car-game-default-rtdb.firebaseio.com/", 
            storageBucket: "ai-car-game.firebasestorage.app",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');
        const moveRef = ref(db, 'car/move');

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];

        // 鍵盤控制 (保持不變)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
            if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
            targetX = lanes[currentLaneIndex];
        });

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('sensorBtn').onclick = () => {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('deviceorientation', e => set(tiltRef, Math.round(e.gamma))); });
                } else { window.addEventListener('deviceorientation', e => set(tiltRef, Math.round(e.gamma))); }
            };
            document.getElementById('left-zone').ontouchstart = (e) => { e.preventDefault(); set(moveRef, Date.now() + "_-1"); };
            document.getElementById('right-zone').ontouchstart = (e) => { e.preventDefault(); set(moveRef, Date.now() + "_1"); };
        }

        document.getElementById('startBtn').onclick = () => {
            set(moveRef, "0_0"); set(tiltRef, 0); // 開局歸零
            gameStarted = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgm').play();
            init3D(); animate();
            onValue(tiltRef, s => { 
                const t = s.val() || 0; 
                if (t < -15) currentLaneIndex = 0; else if (t > 15) currentLaneIndex = 2; else currentLaneIndex = 1; 
                targetX = lanes[currentLaneIndex]; 
            });
            onValue(moveRef, s => { 
                const d = parseInt((s.val()||"").split("_")[1]); 
                if (d === -1 && currentLaneIndex > 0) currentLaneIndex--; 
                if (d === 1 && currentLaneIndex < 2) currentLaneIndex++; 
                targetX = lanes[currentLaneIndex]; 
            });
            setInterval(() => { if(gameStarted) { score++; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); } }, 100);
            setInterval(createObstacle, 1100);
        };

        // 💡 擬真版 3D 引擎 初始化
        function init3D() {
            scene = new THREE.Scene();
            // 加入迷霧 (Fog)，增加遠景層次感
            scene.fog = new THREE.Fog(0x000000, 30, 140); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); // 開啟抗鋸齒
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. 擬真馬路 (深灰色瀝青)
            const roadGeometry = new THREE.PlaneGeometry(16, 2000);
            const roadMaterial = new THREE.MeshPhongMaterial({ color: 0x1a1a1a, shininess: 10 }); // 瀝青微光
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2; // 轉向水平
            scene.add(road);

            // 2. 動態路標線 (白色虛線)
            const lineGeometry = new THREE.PlaneGeometry(0.3, 5);
            const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for (let i = 0; i < 40; i++) {
                const line = new THREE.Mesh(lineGeometry, lineMaterial);
                line.rotation.x = -Math.PI / 2;
                line.position.set(-1.75, 0.05, -i * 15); // 置於車道中間稍微偏左
                scene.add(line);
                roadLines.push(line);
                
                // 複製一條線到右側車道
                const line2 = line.clone();
                line2.position.set(1.75, 0.05, -i * 15);
                scene.add(line2);
                roadLines.push(line2);
            }

            // 3. 擬真賽車模型 (手工打造：車身+駕駛艙+輪胎)
            car = new THREE.Group();

            // 車身 (藍色金屬感 MeshPhongMaterial)
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.8, 0.6, 3.4), 
                new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0xffffff, shininess: 50 })
            );
            body.position.y = 0.5; // 車底離地
            car.add(body);

            // 駕駛艙 (黑色 MeshPhongMaterial)
            const cabin = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.5, 1.4), 
                new THREE.MeshPhongMaterial({ color: 0x000000, shininess: 20 })
            );
            cabin.position.set(0, 1.05, -0.2); // 位於車身中央偏前
            car.add(cabin);

            // 輪胎 (四個黑色圓柱體)
            const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 16); // 圓柱體
            const wheelMaterial = new THREE.MeshPhongMaterial({ color: 0x222222 }); // 深灰色橡膠
            
            // 四個輪胎的位置
            const wheelPositions = [[-0.9,-1.1], [0.9,-1.1], [-0.9,1.1], [0.9,1.1]];
            wheelPositions.forEach(p => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2; // 輪胎轉向水平
                wheel.position.set(p[0], 0.4, p[1]); // 依序放置
                car.add(wheel);
            });

            scene.add(car);
            car.position.set(0, 0, 12); // 起始位置

            // 4. 光影環境
            // 環境光 (提供基礎亮度)
            scene.add(new THREE.AmbientLight(0xffffff, 0.6)); 

            // 方向光 (太陽光，提供立體感和陰影)
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 15, 10);
            scene.add(sun);

            // 相機視角 (更貼近擬真賽車视角)
            camera.position.set(0, 6, 26); 
            camera.lookAt(0, 1, 0); // 調整相機看向的地方，讓畫面更聚焦於前方的路
        }

        // (障碍物設計也優化成更有立體感的箱子)
        function createObstacle() {
            if (!gameStarted) return;
            const obsGeometry = new THREE.BoxGeometry(2.1, 1.4, 2.5); // 立方體
            const obsMaterial = new THREE.MeshPhongMaterial({ color: 0xff3333, shininess: 10 }); // 紅色立體箱子
            const obs = new THREE.Mesh(obsGeometry, obsMaterial);
            obs.position.set(lanes[Math.floor(Math.random() * lanes.length)], 0.7, -100); // 隨機車道生成
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);

            // 車子左右平滑移動 ( Lerp 插值 )
            car.position.x += (targetX - car.position.x) * 0.15;

            // 馬路標線動態移動 (營造前進速度感)
            roadLines.forEach(line => {
                line.position.z += 1.8; // 移動速度
                if (line.position.z > 40) {
                    line.position.z = -200; // 回到遠方，循環生成
                }
            });

            // 障碍物移動與碰撞
            obstacles.forEach((obs, i) => {
                obs.position.z += 1.6; // 移動速度
                
                // 精確碰撞檢查 (立體方塊)
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.7) {
                    gameStarted = false;
                    document.getElementById('crashSound').play(); // 撞擊音效
                    document.getElementById('bgm').pause();
                    setTimeout(() => { alert("💥 遊戲結束！得分: " + score); location.reload(); }, 300);
                }

                if (obs.position.z > 50) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
