<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亡命飆速 - 環境比例修復版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; color: white; }
        .title { font-size: 42px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px #007bff; margin-bottom: 10px; }
        .warning-text { color: #ff4444; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .setting-group { margin: 10px 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        .setting-label { font-size: 14px; color: #00d2ff; margin-bottom: 8px; font-weight: bold; }
        .option-group { display: flex; gap: 8px; }
        .opt-btn { padding: 8px 18px; border: 1px solid #007bff; background: transparent; color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 10px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 15px 45px; font-size: 22px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,123,255,0.6); }
        .start-btn:disabled { background: #444; cursor: wait; }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 2000; }
        #scoreDisplay { font-size: 32px; color: #0f0; font-family: monospace; font-weight: bold; float: right; text-shadow: 0 0 10px #0f0; }
        #speedo { color: #fff; font-size: 18px; font-weight: bold; clear: both; float: right; margin-top: 5px; font-family: monospace; }
        #hp-container { width: 180px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 5px; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(to right, #ff3333, #ff6666); transition: 0.3s; }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="title">亡命飆速</div>
        <div class="warning-text">🚨 系統校正完成！全速前進！</div>
        <div class="setting-group">
            <div class="setting-label">🕹️ 操作模式</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤 / 觸控</button>
                <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">手機體感</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🛡️ 挑戰難度</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🔥 遊戲模式</div>
            <div class="option-group">
                <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 一撞即死</button>
                <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ 護甲模式</button>
            </div>
        </div>
        <button id="start-btn" class="start-btn" disabled onclick="handleStart()">資源載入中...</button>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="speedo">0 KM/H</div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, grassPlane, gameStarted = false, score = 0;
        let obstacles = [], decor = [], roadLines = [];
        let obsCarModels = {}; 
        let decorModels = { 0: [], 1: [], 2: [], 3: [] };
        let streetLightModel;
        let policeLightR, policeLightB; 
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.2, hp = 100;
        let settings = { ctrl: 'touch', mode: 'hard', diff: 1 };
        let loadedCount = 0;
        const totalToLoad = 12; 

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        async function handleStart() {
            if (settings.ctrl === 'tilt') {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try { await DeviceOrientationEvent.requestPermission(); } catch (e) { console.error(e); }
                }
            }
            requestAndStart();
        }

        function requestAndStart() {
            document.getElementById('bgm').play().catch(() => {});
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            if (settings.mode === 'easy') document.getElementById('hp-container').style.display = 'block';
            currentSpeed = 1.0 + (settings.diff * 0.3); 
            initControls(); animate();
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    currentSpeed += 0.002;
                    document.getElementById('speedo').innerText = Math.floor(currentSpeed * 80) + " KM/H";
                    updateSeasons(); 
                }
            }, 100);
            setInterval(createObstacle, 1100); 
            setInterval(createDecor, 500);
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 180);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 50, 10); scene.add(sun);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);

            const grassGeo = new THREE.PlaneGeometry(2000, 2000);
            const grassMat = new THREE.MeshPhongMaterial({ color: 0x7cfc00 });
            grassPlane = new THREE.Mesh(grassGeo, grassMat);
            grassPlane.rotation.x = -Math.PI / 2; grassPlane.position.y = -0.1; scene.add(grassPlane);

            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 7), new THREE.MeshBasicMaterial({ color: 0xcccccc }));
                line.rotation.x = -Math.PI / 2; line.position.set(-1.8, 0.05, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.8; scene.add(line2); roadLines.push(line2);
            }

            policeLightR = new THREE.PointLight(0xff0000, 0, 50);
            policeLightB = new THREE.PointLight(0x0000ff, 0, 50);
            scene.add(policeLightR, policeLightB);

            const loader = new THREE.GLTFLoader();

            loader.load('car.glb', (gltf) => { 
                let model = gltf.scene; fixTransparent(model);
                model.scale.set(4.5, 4.5, 4.5); model.rotation.y = 0;
                car = new THREE.Group(); car.add(model); scene.add(car); car.position.z = 15; checkLoaded();
            });

            const carFiles = ['car1.glb', 'car2.glb', 'car3.glb', 'car4.glb', 'car5.glb', 'car6.glb'];
            carFiles.forEach(file => {
                loader.load(file, (gltf) => {
                    let model = gltf.scene; fixTransparent(model);
                    if(file === 'car6.glb') model.scale.set(1.8, 1.8, 1.8); else model.scale.set(3.2, 3.2, 3.2);
                    obsCarModels[file] = model; checkLoaded();
                }, undefined, (err) => { checkLoaded(); });
            });

            // 🌳 載入四季裝飾
            loader.load('birch_trees_pack__ps1_low_poly.glb', (gltf) => {
                gltf.scene.traverse(n => { if(n.isMesh) { fixTransparent(n); decorModels[0].push(n); decorModels[1].push(n); } });
                checkLoaded();
            }, undefined, (err) => checkLoaded());

            loader.load('pine_trees_pack__ps1_low_poly.glb', (gltf) => {
                gltf.scene.traverse(n => { if(n.isMesh) { fixTransparent(n); decorModels[2].push(n); } });
                checkLoaded();
            }, undefined, (err) => checkLoaded());

            loader.load('snowy_pine_trees_pack__ps1_low_poly.glb', (gltf) => {
                gltf.scene.traverse(n => { if(n.isMesh) { fixTransparent(n); decorModels[3].push(n); } });
                checkLoaded();
            }, undefined, (err) => checkLoaded());

            loader.load('Snowman.glb', (gltf) => {
                let model = gltf.scene; fixTransparent(model);
                model.scale.set(1, 1, 1); decorModels[3].push(model);
                checkLoaded();
            }, undefined, (err) => checkLoaded());

            loader.load('Street_Light.glb', (gltf) => {
                let model = gltf.scene; fixTransparent(model);
                model.scale.set(2, 2, 2); streetLightModel = model;
                checkLoaded();
            }, undefined, (err) => checkLoaded());

            camera.position.set(0, 8, 28); camera.lookAt(0, 2, 0);
        }

        function fixTransparent(model) {
            model.traverse((node) => { if (node.isMesh) { node.material.transparent = false; node.material.opacity = 1.0; node.material.depthWrite = true; } });
        }

        function checkLoaded() {
            loadedCount++; 
            if(loadedCount >= totalToLoad) { 
                const btn = document.getElementById('start-btn');
                btn.disabled = false; btn.innerText = "開始飆速"; 
            }
        }

        function createObstacle() {
            const keys = Object.keys(obsCarModels);
            if (!gameStarted || keys.length === 0) return;
            let randomKey = keys[Math.floor(Math.random() * keys.length)];
            let carClone = obsCarModels[randomKey].clone();
            carClone.rotation.y = (randomKey === 'car6.glb') ? 0 : Math.PI / 2;
            carClone.position.set(lanes[Math.floor(Math.random() * 3)], 0, -150);
            scene.add(carClone); obstacles.push(carClone);
        }

        function createDecor() {
            if (!gameStarted) return;
            const seasonIdx = Math.floor(score / 200) % 4;
            const side = Math.random() > 0.5 ? 1 : -1;
            let item;

            if (Math.random() < 0.15 && streetLightModel) {
                item = streetLightModel.clone();
                item.rotation.y = (side > 0) ? 0 : Math.PI;
                item.scale.set(2.5, 2.5, 2.5); // 💡 路燈比例
            } else if (decorModels[seasonIdx].length > 0) {
                item = decorModels[seasonIdx][Math.floor(Math.random() * decorModels[seasonIdx].length)].clone();
                // 💡 關鍵修正：樹包比例從 4 降到 0.5，雪人比例降到 0.8
                let s = item.name.includes("Snowman") ? 0.8 : 0.5;
                item.scale.set(s, s, s);
            }

            if (item) {
                item.position.set(side * (Math.random() * 5 + 13), 0, -200);
                scene.add(item); decor.push(item);
            }
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1 + Math.PI; 

            let flash = Math.floor(Date.now() / 150) % 2;
            policeLightR.intensity = (flash === 0) ? 35 : 0;
            policeLightB.intensity = (flash === 1) ? 35 : 0;
            policeLightR.position.set(car.position.x - 2, 5, car.position.z);
            policeLightB.position.set(car.position.x + 2, 5, car.position.z);

            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 40) l.position.z = -200; });
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 40) { scene.remove(d); decor.splice(i, 1); }});
            
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 1.3 && Math.abs(car.position.x - obs.position.x) < 1.0) {
                    gameStarted = false; setTimeout(() => { alert("🚨 被逮捕！得分: " + score); location.reload(); }, 100);
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }

        function updateSeasons() {
            const seasonIndex = Math.floor(score / 200) % 4;
            const skyColors = [0x87CEEB, 0xfff9c4, 0xffcc80, 0xd1d9e6];
            const grassColors = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff];
            if(scene) {
                scene.background.setHex(skyColors[seasonIndex]);
                scene.fog.color.setHex(skyColors[seasonIndex]);
                if (grassPlane) grassPlane.material.color.setHex(grassColors[seasonIndex]);
            }
        }

        function initControls() {
            const l = () => { if (currentLaneIndex > 0) { currentLaneIndex--; targetX = lanes[currentLaneIndex]; } };
            const r = () => { if (currentLaneIndex < 2) { currentLaneIndex++; targetX = lanes[currentLaneIndex]; } };
            window.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') l(); if (e.key === 'ArrowRight') r(); });
            window.addEventListener('touchstart', (e) => { if (settings.ctrl === 'touch') e.touches[0].clientX < window.innerWidth/2 ? l() : r(); });
            window.addEventListener('deviceorientation', (e) => { if (settings.ctrl === 'tilt') { const t = e.gamma; if (t < -10) currentLaneIndex = 0; else if (t > 10) currentLaneIndex = 2; else currentLaneIndex = 1; targetX = lanes[currentLaneIndex]; } });
        }
        window.onload = init3D;
    </script>
</body>
</html>
