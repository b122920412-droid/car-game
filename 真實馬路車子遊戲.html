<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .title { color: white; font-size: 42px; margin-bottom: 25px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 15px #007bff; }
        .setting-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; width: 340px; margin-bottom: 15px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .setting-header { color: #00d2ff; font-size: 14px; margin-bottom: 10px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .opt-btn { padding: 8px 18px; border: 1px solid #007bff; background: transparent; color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 10px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 18px 50px; font-size: 24px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,123,255,0.5); }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 100; }
        #scoreDisplay { font-size: 32px; color: #0f0; font-family: monospace; font-weight: bold; float: right; text-shadow: 0 0 10px #0f0; }
        #hp-container { width: 180px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 8px; overflow: hidden; display: none; margin-bottom: 5px; }
        #hp-bar { width: 100%; height: 100%; background: #ff3333; transition: 0.3s; }
        #speedo { color: #fff; font-size: 18px; font-weight: bold; clear: both; float: right; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="title">賽車小遊戲</div>
        <div class="setting-card">
            <div class="setting-header">🕹️ 操作模式</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤 / 點擊模式</button>
                <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">體感模式</button>
            </div>
        </div>
        <div class="setting-card">
            <div class="setting-header">🛡️ 挑戰難度</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
            </div>
        </div>
        <div class="setting-card">
            <div class="setting-header">🔥 遊戲模式</div>
            <div class="option-group">
                <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 極限 (一撞即死)</button>
                <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ 休閒 (有HP)</button>
            </div>
        </div>
        <button class="start-btn" onclick="requestAndStart()">進入賽道</button>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="speedo">0 KM/H</div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, grassPlane, gameStarted = false, score = 0;
        let obstacles = [], decor = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.6, hp = 100;
        let settings = { ctrl: 'touch', mode: 'hard', diff: 1 };

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        function requestAndStart() {
            const bgm = document.getElementById('bgm');
            const clang = document.getElementById('crashSound');
            bgm.volume = 0.2; bgm.play().catch(() => {});
            clang.play().then(() => { clang.pause(); clang.currentTime = 0; }).catch(() => {});
            if (settings.ctrl === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        }

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            if (settings.mode === 'easy') {
                hp = 100;
                document.getElementById('hp-bar').style.width = "100%";
                document.getElementById('hp-container').style.display = 'block';
            }
            currentSpeed = 1.2 + (settings.diff * 0.5); 
            init3D(); initControls(); animate();
            
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = `${Math.floor(currentSpeed * 50)} KM/H`;
                    if (score % 80 === 0 && currentSpeed < 10) currentSpeed += (0.15 * settings.diff);
                    updateSeasons(); 
                }
            }, 100);
            setInterval(createObstacle, 1000 - (settings.diff * 120));
            setInterval(createDecor, 600);
        }

        function updateSeasons() {
            const seasonIndex = Math.floor(score / 100) % 4;
            const fogColors = [0xbbdefb, 0xfff9c4, 0xffcc80, 0xd1d9e6];
            const clearColors = [0x90caf9, 0xfff59d, 0xffb74d, 0xbdc9d8];
            const grassColors = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff];

            scene.fog.color.setHex(fogColors[seasonIndex]);
            renderer.setClearColor(clearColors[seasonIndex]);
            if (grassPlane) grassPlane.material.color.setHex(grassColors[seasonIndex]);
        }

        function initControls() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
            if (settings.ctrl === 'touch') {
                window.addEventListener('touchstart', (e) => {
                    if (e.touches[0].clientX < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                    else { if (currentLaneIndex < 2) currentLaneIndex++; }
                    targetX = lanes[currentLaneIndex];
                });
            } else {
                window.addEventListener('deviceorientation', (e) => {
                    const tilt = e.gamma; 
                    if (tilt < -12) currentLaneIndex = 0; else if (tilt > 12) currentLaneIndex = 2; else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xbbdefb, 30, 110);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            const grassGeo = new THREE.PlaneGeometry(2000, 2000);
            const grassMat = new THREE.MeshPhongMaterial({ color: 0x7cfc00 });
            grassPlane = new THREE.Mesh(grassGeo, grassMat);
            grassPlane.rotation.x = -Math.PI / 2;
            grassPlane.position.y = -0.1;
            scene.add(grassPlane);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 2000), new THREE.MeshPhongMaterial({ color: 0x222222, specular: 0x444444 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);

            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 7), new THREE.MeshBasicMaterial({ color: 0x555555 }));
                line.rotation.x = -Math.PI / 2; line.position.set(-1.75, 0.05, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.75; scene.add(line2); roadLines.push(line2);
            }

            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 3.8), new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0xaaaaaa, shininess: 100 }));
            body.position.y = 0.5; car.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.5), new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 200 }));
            cabin.position.set(0, 1.0, -0.2); car.add(cabin);
            const spoiler = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.1, 0.6), new THREE.MeshPhongMaterial({ color: 0x0056b3 }));
            spoiler.position.set(0, 1.2, 1.5); car.add(spoiler);
            const wGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.5, 24);
            const wMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            [[-1,0.4,-1.3], [1,0.4,-1.3], [-1,0.4,1.3], [1,0.4,1.3]].forEach(p => {
                const w = new THREE.Mesh(wGeo, wMat); w.rotation.z = Math.PI/2; w.position.set(p[0],p[1],p[2]); car.add(w);
            });
            scene.add(car); car.position.z = 15;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.PointLight(0xffffff, 1.2); light.position.set(0, 20, 20); scene.add(light);
            camera.position.set(0, 8, 28); camera.lookAt(0, 2, 0);
        }

        function createObstacle() {
            if (!gameStarted) return;
            const type = Math.random();
            let obs;
            if (type < 0.3) { 
                // 🍌 強化版：三連排巨大香蕉皮堆
                obs = new THREE.Group();
                const bananaMat = new THREE.MeshPhongMaterial({ color: 0xfff200, specular: 0xffffff, shininess: 100 });
                const b1 = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.15, 8, 12, Math.PI), bananaMat);
                b1.rotation.x = Math.PI / 2;
                const b2 = b1.clone(); b2.position.set(0.4, 0, 0.4); b2.rotation.z = 0.5;
                const b3 = b1.clone(); b3.position.set(-0.4, 0, 0.2); b3.rotation.z = -0.5;
                obs.add(b1, b2, b3);
                obs.scale.set(1.2, 1, 1.2); // 整體放大
            } else if (type < 0.6) { 
                // 🛢️ 擬真油桶
                obs = new THREE.Group();
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 2), new THREE.MeshPhongMaterial({ color: 0x333333 }));
                const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 0.5), new THREE.MeshPhongMaterial({ color: 0xcc0000 }));
                obs.add(barrel, stripe);
            } else { 
                // 📦 木頭貨箱
                obs = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2, 2.2), new THREE.MeshPhongMaterial({ color: 0x8b4513, specular: 0x222222 }));
            }
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.7, -120);
            scene.add(obs); obstacles.push(obs);
        }

        function createDecor() {
            if (!gameStarted) return;
            const seasonIndex = Math.floor(score / 100) % 4;
            const side = Math.random() > 0.5 ? 1 : -1;
            const xBase = side * (12 + Math.random() * 8);
            let d = new THREE.Group();
            if (seasonIndex === 0) {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 5), new THREE.MeshPhongMaterial({ color: 0x4a2c10 }));
                const foliage = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshPhongMaterial({ color: 0xffc0cb }));
                foliage.position.y = 3.5; d.add(trunk, foliage);
            } else if (seasonIndex === 1) {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 7), new THREE.MeshPhongMaterial({ color: 0x3d2817 }));
                const foliage = new THREE.Mesh(new THREE.IcosahedronGeometry(3, 0), new THREE.MeshPhongMaterial({ color: 0x1b5e20 }));
                foliage.position.y = 4.5; d.add(trunk, foliage);
            } else if (seasonIndex === 2) {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 6), new THREE.MeshPhongMaterial({ color: 0x4e342e }));
                const foliage = new THREE.Mesh(new THREE.OctahedronGeometry(2.5), new THREE.MeshPhongMaterial({ color: 0xe64a19 }));
                foliage.position.y = 4; d.add(trunk, foliage);
            } else {
                const body = new THREE.Mesh(new THREE.SphereGeometry(1.2), new THREE.MeshPhongMaterial({ color: 0xffffff }));
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.8), new THREE.MeshPhongMaterial({ color: 0xffffff }));
                head.position.y = 1.6; d.add(body, head);
            }
            d.position.set(xBase, 0, -120);
            scene.add(d); decor.push(d);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1;
            
            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 40) l.position.z = -200; });
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 40) { scene.remove(d); decor.splice(i, 1); } });
            
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                const distZ = Math.abs(car.position.z - obs.position.z);
                const distX = Math.abs(car.position.x - obs.position.x);

                if (distZ < 2.5 && distX < 1.8) {
                    const boom = document.getElementById('crashSound');
                    boom.currentTime = 0; boom.play();

                    if (settings.mode === 'hard') {
                        gameStarted = false;
                        setTimeout(() => { alert("💀 任務失敗！最終得分: " + score); location.reload(); }, 100);
                    } else {
                        hp -= 25;
                        document.getElementById('hp-bar').style.width = hp + "%";
                        scene.remove(obs); obstacles.splice(i, 1);
                        if (hp <= 0) {
                            gameStarted = false;
                            setTimeout(() => { alert("💔 引擎損毀！最終得分: " + score); location.reload(); }, 100);
                        }
                    }
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
