<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亡命飆速 - 3D 最終優化版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; color: white; }
        .title { font-size: 42px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px #007bff; margin-bottom: 10px; }
        .start-btn { padding: 15px 45px; font-size: 22px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,123,255,0.6); }
        .start-btn:disabled { background: #444; cursor: wait; }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 100; }
        #scoreDisplay { font-size: 32px; color: #0f0; font-family: monospace; font-weight: bold; float: right; text-shadow: 0 0 10px #0f0; }
        #speedo { color: #fff; font-size: 18px; font-weight: bold; clear: both; float: right; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="title">四季賽車：重裝追捕</div>
        <button id="start-btn" class="start-btn" disabled onclick="requestAndStart()">資源載入中...</button>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="speedo">0 KM/H</div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, gameStarted = false, score = 0;
        let obstacles = [], decor = [], roadLines = [];
        let obsModel1, obsModel2, obsModel3; 
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.6;

        function requestAndStart() {
            document.getElementById('bgm').play().catch(() => {});
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            initControls(); 
            animate();
            
            // 計分與速度更新
            setInterval(() => { 
                if(gameStarted) {
                    score++; 
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = `${Math.floor(currentSpeed * 50)} KM/H`;
                    // 隨時間稍微增加難度
                    if(score % 100 === 0 && currentSpeed < 5) currentSpeed += 0.1;
                }
            }, 100);
            
            setInterval(createPoliceObstacle, 1000);
            setInterval(createDecor, 800);
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xbbdefb, 30, 120);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // 燈光設定
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // 地面馬路
            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x1a1a1a }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            const loader = new THREE.GLTFLoader();

            // 1. 載入主角車
            car = new THREE.Group();
            scene.add(car);
            loader.load('car.glb', (gltf) => { 
                gltf.scene.scale.set(12, 12, 12); 
                gltf.scene.rotation.y = Math.PI; 
                car.add(gltf.scene); 
                checkAllLoaded();
            });

            // 2. 載入路障模型 (修正比例後的數值)
            // 拒馬縮小到原本的十分之一
            loader.load('barriers.glb', (gltf) => { 
                obsModel1 = gltf.scene; 
                obsModel1.scale.set(0.8, 0.8, 0.8); 
                checkAllLoaded(); 
            });
            // 交通錐比例調整
            loader.load('Traffic Cone.glb', (gltf) => { 
                obsModel2 = gltf.scene; 
                obsModel2.scale.set(1.5, 1.5, 1.5); 
                checkAllLoaded(); 
            });
            // 警察車比例與主角對齊
            loader.load('police car.glb', (gltf) => { 
                obsModel3 = gltf.scene; 
                obsModel3.scale.set(12, 12, 12); 
                obsModel3.rotation.y = Math.PI; 
                checkAllLoaded(); 
            });

            car.position.z = 15;
            camera.position.set(0, 8, 28);
            camera.lookAt(0, 2, 0);
        }

        let loadedCount = 0;
        function checkAllLoaded() {
            loadedCount++;
            if(loadedCount >= 4) {
                const btn = document.getElementById('start-btn');
                btn.disabled = false;
                btn.innerText = "進入賽道";
            }
        }

        function createPoliceObstacle() {
            if (!gameStarted) return;
            const type = Math.random();
            let obs = new THREE.Group();
            let modelSample;

            if (type < 0.33) {
                modelSample = obsModel1; // 拒馬
            } else if (type < 0.66) {
                modelSample = obsModel2; // 交通錐
            } else {
                modelSample = obsModel3; // 警察車
                obs.userData = { isCar: true, speed: currentSpeed * 0.4 };
            }

            if (modelSample) {
                obs.add(modelSample.clone());
            }
            
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0, -120);
            scene.add(obs);
            obstacles.push(obs);
        }

        function initControls() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
            window.addEventListener('touchstart', (e) => {
                if (e.touches[0].clientX < window.innerWidth / 2) {
                    if (currentLaneIndex > 0) currentLaneIndex--;
                } else {
                    if (currentLaneIndex < 2) currentLaneIndex++;
                }
                targetX = lanes[currentLaneIndex];
            });
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            
            // 主角車平滑移動
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1 + Math.PI; // 微調車頭擺動感

            obstacles.forEach((obs, i) => {
                // 移動邏輯：如果是警察車會跑得比靜止路障慢一點點（相對於玩家速度）
                obs.position.z += obs.userData.isCar ? currentSpeed * 0.6 : currentSpeed;
                
                // 精確碰撞判定 (根據模型縮小後的尺寸調整)
                const distZ = Math.abs(car.position.z - obs.position.z);
                const distX = Math.abs(car.position.x - obs.position.x);
                
                if (distZ < 2.2 && distX < 1.6) {
                    gameStarted = false;
                    alert("🚨 被警方攔截！最終得分: " + score);
                    location.reload();
                }
                
                // 超過畫面刪除，釋放記憶體
                if (obs.position.z > 40) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            });
            renderer.render(scene, camera);
        }

        function createDecor() { 
            // 裝飾物(如樹木)邏輯
            const side = Math.random() > 0.5 ? 1 : -1;
            const tree = new THREE.Mesh(
                new THREE.BoxGeometry(2, 4, 2), 
                new THREE.MeshPhongMaterial({ color: 0x228b22 })
            );
            tree.position.set(side * 12, 2, -120);
            scene.add(tree);
            decor.push(tree);
            // 裝飾物回收
            setTimeout(() => { scene.remove(tree); }, 10000);
        }

        window.onload = init3D;
    </script>
</body>
</html>
