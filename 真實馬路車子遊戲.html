<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲 - 80s Retro</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #2266ff; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; color: #fff; }
        .title { font-size: 45px; font-weight: 900; color: #ffff00; text-shadow: 4px 4px #ff0000; margin-bottom: 20px; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #ff0000; border: 4px solid #fff; color: #fff; font-weight: bold; margin-top: 10px; width: 250px; }
        .btn:hover { background: #cc0000; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; pointer-events: none; z-index: 100; display: flex; justify-content: space-between; color: #fff; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
        #speedo { position: absolute; top: 60px; right: 20px; color: #fff; font-size: 20px; }
        #hp-container { width: 150px; height: 20px; background: #000; border: 3px solid #fff; position: absolute; top: 60px; left: 20px; display: none; }
        #hp-bar { width: 100%; height: 100%; background: #f00; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="title">SUPER RACING</div>
        <div style="margin-bottom: 20px; color: #00ff00;">SELECT MODE</div>
        <button class="btn" onclick="setupControl('touch')">KEYBOARD / TOUCH</button>
        <button class="btn" onclick="setupControl('tilt')" style="background: #0000ff;">TILT SENSOR</button>
        <div style="margin-top: 20px; font-size: 14px; color: #aaa;">MODE: HARDCORE (ONE HIT KO)</div>
    </div>

    <div id="ui-layer">
        <div>SCORE: <span id="scoreDisplay">0</span></div>
        <div>TIME: <span id="timerDisplay">0</span></div>
    </div>
    <div id="hp-container"><div id="hp-bar"></div></div>
    <div id="speedo">SPEED: 0 KM/H</div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, gameStarted = false, score = 0, time = 0;
        let obstacles = [], roadLines = [], decor = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.8, hp = 100;
        let controlType = 'touch';

        function setupControl(type) {
            controlType = type;
            document.getElementById('bgm').play().catch(() => {});
            if (type === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        }

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            init3D();
            initControls();
            animate();
            setInterval(() => {
                if(gameStarted) {
                    score += 1;
                    time += 1;
                    document.getElementById('scoreDisplay').innerText = score;
                    document.getElementById('timerDisplay').innerText = Math.floor(time/10);
                    document.getElementById('speedo').innerText = `SPEED: ${Math.floor(currentSpeed * 60)} KM/H`;
                    if (score % 100 === 0 && currentSpeed < 10) currentSpeed += 0.2;
                }
            }, 100);
            setInterval(createObstacle, 1000);
            setInterval(createSideDecor, 500);
        }

        function initControls() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
            if (controlType === 'touch') {
                window.addEventListener('touchstart', (e) => {
                    if (e.touches[0].clientX < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                    else { if (currentLaneIndex < 2) currentLaneIndex++; }
                    targetX = lanes[currentLaneIndex];
                });
            } else {
                window.addEventListener('deviceorientation', (e) => {
                    let tilt = e.gamma;
                    if (tilt < -10) currentLaneIndex = 0; else if (tilt > 10) currentLaneIndex = 2; else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2266ff); // 💡 經典藍色天空
            scene.fog = new THREE.Fog(0x2266ff, 40, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false }); // 💡 關閉反鋸齒增加像素感
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 💡 草地地景
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({ color: 0x00aa00 }));
            grass.rotation.x = -Math.PI / 2;
            scene.add(grass);

            // 💡 路面
            const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshBasicMaterial({ color: 0x444444 }));
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.05;
            scene.add(road);

            // 💡 紅白防撞邊線
            for (let i = 0; i < 80; i++) {
                const color = i % 2 === 0 ? 0xff0000 : 0xffffff;
                const sideLineL = new THREE.Mesh(new THREE.PlaneGeometry(1, 6), new THREE.MeshBasicMaterial({ color: color }));
                sideLineL.rotation.x = -Math.PI / 2;
                sideLineL.position.set(-10.5, 0.1, -i * 6);
                scene.add(sideLineL); roadLines.push(sideLineL);
                
                const sideLineR = sideLineL.clone();
                sideLineR.position.x = 10.5;
                scene.add(sideLineR); roadLines.push(sideLineR);
            }

            // 💡 賽車 (恢復藍色方塊)
            const carGeo = new THREE.BoxGeometry(2, 1, 4);
            const carMat = new THREE.MeshBasicMaterial({ color: 0x0000ff }); // 💡 使用純色 BasicMaterial 更有像素感
            car = new THREE.Mesh(carGeo, carMat);
            car.position.y = 0.6;
            car.position.z = 20;
            scene.add(car);

            camera.position.set(0, 8, 40);
            camera.lookAt(0, 2, 0);
        }

        function createSideDecor() {
            if (!gameStarted) return;
            // 💡 遠方山脈
            const mtn = new THREE.Mesh(new THREE.ConeGeometry(10, 15, 4), new THREE.MeshBasicMaterial({ color: 0x663300 }));
            mtn.position.set(Math.random() > 0.5 ? 40 : -40, 5, -150);
            scene.add(mtn);
            decor.push(mtn);
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2, 2.5), new THREE.MeshBasicMaterial({ color: 0xff00ff }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 1, -150);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            
            // 地景流動
            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 50) l.position.z = -400; });
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 50) { scene.remove(d); decor.splice(i, 1); } });
            
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 3 && Math.abs(car.position.x - obs.position.x) < 2) {
                    gameStarted = false;
                    document.getElementById('crashSound').play();
                    setTimeout(() => { alert("GAME OVER! SCORE: " + score); location.reload(); }, 200);
                }
                if (obs.position.z > 50) { scene.remove(obs); obstacles.splice(i, 1); }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
