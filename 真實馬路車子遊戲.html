<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 體感賽車 - 終極發表版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .btn { padding: 20px 50px; font-size: 26px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #scoreDisplay { position: absolute; top: 20px; right: 20px; font-size: 35px; color: #0f0; font-family: monospace; font-weight: bold; z-index: 100; text-shadow: 0 0 10px #0f0; }
        .hint { color: #888; margin-top: 20px; font-size: 14px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="startBtn" class="btn">開始挑戰</button>
        <p class="hint">🔊 點擊後播放音樂<br>⌨️ 電腦：使用鍵盤左右鍵<br>📱 手機：傾斜手機或點擊左右側</p>
    </div>

    <div id="scoreDisplay">00000</div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, gameStarted = false, score = 0;
        let obstacles = [], trees = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 2.0; 

        // 💡 重新補回鍵盤控制監聽
        function initControls() {
            // 鍵盤監聽
            window.addEventListener('keydown', (e) => {
                if (!gameStarted) return;
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });

            // 手機觸控監聽
            window.addEventListener('touchstart', (e) => {
                if (!gameStarted) return;
                const x = e.touches[0].clientX;
                if (x < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                else { if (currentLaneIndex < 2) currentLaneIndex++; }
                targetX = lanes[currentLaneIndex];
            });

            // 手機體感監聽
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    if (!gameStarted) return;
                    const tilt = e.gamma; 
                    if (tilt < -15) currentLaneIndex = 0;
                    else if (tilt > 15) currentLaneIndex = 2;
                    else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
        }

        document.getElementById('startBtn').onclick = () => {
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5;
            bgm.play().catch(e => console.log("播放失敗:", e));

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        };

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            init3D();
            initControls();
            animate();
            
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    if (score % 50 === 0 && currentSpeed < 4.5) currentSpeed += 0.2;
                }
            }, 100);
            setInterval(createObstacle, 1000); 
            setInterval(createTree, 1500);
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 30, 140);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(16, 2000), new THREE.MeshPhongMaterial({ color: 0x1a1a1a }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            for (let i = 0; i < 40; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 5), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-1.75, 0.05, -i * 15);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.75; scene.add(line2); roadLines.push(line2);
            }

            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.4), new THREE.MeshPhongMaterial({ color: 0x007bff, shininess: 80 }));
            body.position.y = 0.5;
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.4), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            cabin.position.set(0, 1.05, -0.2);
            car.add(body, cabin);
            scene.add(car);
            car.position.z = 12;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 15, 10);
            scene.add(light);

            camera.position.set(0, 6, 26);
            camera.lookAt(0, 1, 0);
        }

        function createTree() {
            if (!gameStarted) return;
            [-10, 10].forEach(x => {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2), new THREE.MeshPhongMaterial({ color: 0x8b4513 }));
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshPhongMaterial({ color: 0x228b22 }));
                leaves.position.y = 2.5; trunk.position.y = 1;
                tree.add(trunk, leaves);
                tree.position.set(x, 0, -120);
                scene.add(tree); trees.push(tree);
            });
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2.1, 1.4, 2.5), new THREE.MeshPhongMaterial({ color: 0xff3333 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.7, -100);
            scene.add(obs); obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 40) l.position.z = -200; });
            trees.forEach((t, i) => { t.position.z += currentSpeed; if(t.position.z > 40) { scene.remove(t); trees.splice(i, 1); } });
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.7) {
                    gameStarted = false;
                    document.getElementById('crashSound').play();
                    setTimeout(() => { alert("💥 遊戲結束！得分: " + score); location.reload(); }, 200);
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
