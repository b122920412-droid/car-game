<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲-亡命飆速 (報告優化版)</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #0b0b1a; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3a, #050510); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; color: white; text-align: center; }
        .title { font-size: 56px; font-weight: 900; letter-spacing: 6px; color: #fff; text-shadow: 0 0 30px #007bff; margin: 0; }
        .warning-text { color: #ff4444; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; animation: blink 1.2s infinite; font-size: 18px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .setting-group { margin: 10px 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; width: 340px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .setting-label { font-size: 14px; color: #00d2ff; margin-bottom: 10px; font-weight: bold; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .opt-btn { padding: 10px 18px; border: 1px solid #007bff; background: rgba(0, 123, 255, 0.1); color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 20px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 20px 80px; font-size: 26px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: 900; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,123,255,0.4); }
        .start-btn:disabled { background: #333; cursor: wait; opacity: 0.6; }
        #ui-layer { position: absolute; top: 25px; left: 25px; right: 25px; pointer-events: none; z-index: 2000; display: none; }
        #scoreDisplay { font-size: 42px; color: #0f0; font-family: monospace; font-weight: bold; float: right; }
        #speedo { color: #fff; font-size: 22px; font-weight: bold; clear: both; float: right; margin-top: 10px; font-family: monospace; }
        
        #remote-info { margin-top: 15px; font-size: 14px; color: #00ffcc; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; display: none; line-height: 1.5; }
        #controller-ui { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align: center; padding: 20px; }
        input { padding: 12px; border-radius: 8px; border: none; margin: 15px; text-align: center; font-size: 18px; width: 80%; max-width: 200px; }
    </style>
</head>
<body>

    <div id="controller-ui">
        <h2 id="controller-title">📱 手機遙控器</h2>
        <p id="conn-status">請輸入電腦上顯示的 4 位數 ID</p>
        <div id="input-area">
            <input type="text" id="peer-id-input" placeholder="ID 例如: 8888" maxlength="4">
            <br>
            <button class="opt-btn active" style="font-size: 18px; padding: 15px 40px;" onclick="connectToPC()">開始連線</button>
        </div>
        <p id="tilt-hint" style="display:none; color:#00ffcc; margin-top:20px;">連線成功！<br>現在左右傾斜手機來控制賽車。</p>
    </div>

    <div id="start-screen">
        <div class="title">亡命飆速</div>
        <div class="warning-text">🚨 警告：盡全力逃避警方，小心車輛！</div>
        
        <div class="setting-group">
            <div class="setting-label">🕹️ 操控設定</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤/觸控</button>
                <button id="ctrl-remote" class="opt-btn" onclick="setSetting('ctrl', 'remote')">多人報告(手機遙控)</button>
                <button id="ctrl-as-remote" class="opt-btn" onclick="setupAsController()">我是遙控器</button>
            </div>
            <div id="remote-info">
                電腦連線 ID: <span id="my-id" style="font-size:24px; font-weight:bold; color:#fff;">載入中...</span><br>
                <small>(台下觀眾掃碼後點「我是遙控器」並輸入此 ID)</small>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-label">🛡️ 挑戰難度</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
            </div>
        </div>
        <button id="start-btn" class="start-btn" disabled onclick="handleStart()">加速載入中...</button>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="speedo">0 KM/H</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, grassPlane, road, gameStarted = false, score = 0;
        let obstacles = [], decor = [], streetLightModel = null;
        let obsCarModels = {}, decorPool = { 0: [], 1: [], 2: [], 3: [] };
        let policeLightR, policeLightB, lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.0, settings = { ctrl: 'touch', mode: 'hard', diff: 1 };
        let coreLoaded = { car: false, light: false };
        
        let peer = null, activeConn = null;

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
            if (val === 'remote') {
                document.getElementById('remote-info').style.display = 'block';
                initPeerAsPC();
            } else {
                document.getElementById('remote-info').style.display = 'none';
            }
        }

        // --- 電腦端連線邏輯 ---
        function initPeerAsPC() {
            if (peer) return;
            const randomID = Math.floor(1000 + Math.random() * 8999).toString();
            peer = new Peer(randomID);
            peer.on('open', id => document.getElementById('my-id').innerText = id);
            peer.on('connection', c => {
                if (activeConn) {
                    c.on('open', () => {
                        c.send({ type: 'error', msg: '目前已有操控者，請稍候' });
                        setTimeout(() => c.close(), 500);
                    });
                    return;
                }
                activeConn = c;
                document.getElementById('my-id').innerText = "已由手機控制中！";
                c.on('data', data => {
                    if (data.type === 'tilt' && gameStarted) handleTilt(data.value);
                });
                c.on('close', () => {
                    activeConn = null;
                    document.getElementById('my-id').innerText = randomID + " (等待重新連線)";
                });
            });
        }

        // --- 手機端遙控介面 ---
        function setupAsController() {
            document.getElementById('controller-ui').style.display = 'flex';
        }

        function connectToPC() {
            const targetID = document.getElementById('peer-id-input').value;
            if(!targetID) return alert("請輸入 ID");
            
            document.getElementById('conn-status').innerText = "連線中...";
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(targetID);
                conn.on('open', () => {
                    conn.on('data', data => {
                        if(data.type === 'error') {
                            document.getElementById('conn-status').innerText = data.msg;
                            document.getElementById('input-area').style.display = 'none';
                        }
                    });
                    document.getElementById('conn-status').innerText = "連線成功！";
                    document.getElementById('input-area').style.display = 'none';
                    document.getElementById('tilt-hint').style.display = 'block';
                    
                    // 開始傳送體感數據
                    window.addEventListener('deviceorientation', e => {
                        conn.send({ type: 'tilt', value: e.gamma });
                    });
                });
                conn.on('close', () => {
                    alert("連線已斷開");
                    location.reload();
                });
            });
        }

        function handleTilt(tilt) {
            if (tilt < -12) currentLaneIndex = 0;
            else if (tilt > 12) currentLaneIndex = 2;
            else currentLaneIndex = 1;
            targetX = lanes[currentLaneIndex];
        }

        // --- 核心遊戲邏輯 ---
        async function handleStart() {
            document.getElementById('bgm').play().catch(e => {});
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            currentSpeed = 0.8 + (settings.diff * 0.4); 
            initControls(); 
            animate();
            setInterval(() => {
                if(gameStarted) {
                    score++; currentSpeed += 0.002;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = Math.floor(currentSpeed * 80) + " KM/H";
                    updateSeasons();
                }
            }, 100);
            setInterval(createObstacle, 1100 - (settings.diff * 100));
            setInterval(createPairs, 500);
        }

        function init3D() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 200);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.4));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(10, 50, 10); scene.add(sun);
            road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);
            grassPlane = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0x7cfc00 }));
            grassPlane.rotation.x = -Math.PI / 2; grassPlane.position.y = -0.15; scene.add(grassPlane);

            policeLightR = new THREE.PointLight(0xff0000, 0, 50); policeLightB = new THREE.PointLight(0x0000ff, 0, 50);
            scene.add(policeLightR, policeLightB);

            const loader = new THREE.GLTFLoader();
            loader.load('car.glb', (g) => { car = g.scene; car.scale.set(4.5, 4.5, 4.5); scene.add(car); car.position.z = 15; coreLoaded.car = true; checkCoreReady(); });
            loader.load('nintendogs_street_light.glb', (g) => { streetLightModel = g.scene; coreLoaded.light = true; checkCoreReady(); });
            ['car1.glb','car2.glb','car3.glb','car4.glb','car5.glb','car6.glb'].forEach(f => { loader.load(f, (g) => { obsCarModels[f] = g.scene; }); });
            const loadTree = (f, idxs) => { loader.load(f, (g) => { g.scene.traverse(n => { if(n.isMesh) idxs.forEach(i => decorPool[i].push(n.clone())); }); }); };
            loadTree('birch_trees_pack__ps1_low_poly.glb', [0, 1]);
            loadTree('pine_trees_pack__ps1_low_poly.glb', [2]);
            loadTree('snowy_pine_trees_pack__ps1_low_poly.glb', [3]);

            camera.position.set(0, 8, 28); camera.lookAt(0, 2, 0);
        }

        function checkCoreReady() { if(coreLoaded.car && coreLoaded.light) { document.getElementById('start-btn').disabled = false; document.getElementById('start-btn').innerText = "進入賽道"; } }

        function createObstacle() {
            const keys = Object.keys(obsCarModels);
            if (!gameStarted || keys.length === 0) return;
            let k = keys[Math.floor(Math.random() * keys.length)];
            let c = obsCarModels[k].clone();
            if(k === 'car6.glb') { c.scale.set(1.8, 1.8, 1.8); c.rotation.y = 0; } 
            else { c.scale.set(3.2, 3.2, 3.2); c.rotation.y = Math.PI / 2; }
            c.position.set(lanes[Math.floor(Math.random() * 3)], 0, -180);
            scene.add(c); obstacles.push(c);
        }

        function createPairs() {
            if (!gameStarted || !streetLightModel) return;
            const idx = Math.floor(score / 200) % 4;
            if (score % 25 === 0) {
                [-1, 1].forEach(side => {
                    let s = streetLightModel.clone();
                    s.scale.set(0.4, 0.4, 0.4); s.position.set(side * 9.5, 0, -220); s.rotation.y = side > 0 ? 0 : Math.PI;
                    scene.add(s); decor.push(s);
                });
            } else if (decorPool[idx] && decorPool[idx].length > 0 && score % 15 === 0) {
                const treeBase = decorPool[idx][Math.floor(Math.random() * decorPool[idx].length)];
                [-1, 1].forEach(side => {
                    let t = treeBase.clone();
                    t.scale.set(0.18, 0.18, 0.18); t.position.set(side * 14.5, 0, -220);
                    scene.add(t); decor.push(t);
                });
            }
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1 + Math.PI; 
            let flash = (Math.floor(Date.now() / 150) % 2);
            policeLightR.intensity = flash === 0 ? 80 : 0;
            policeLightB.intensity = flash === 1 ? 80 : 0;
            policeLightR.position.set(car.position.x - 0.7, 4.5, car.position.z);
            policeLightB.position.set(car.position.x + 0.7, 4.5, car.position.z);
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 40) { scene.remove(d); decor.splice(i, 1); }});
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 2.0 && Math.abs(car.position.x - obs.position.x) < 1.5) endGame();
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }

        function endGame() { gameStarted = false; setTimeout(() => { alert("💥GG！最終得分: " + score); location.reload(); }, 100); }
        function updateSeasons() {
            const idx = Math.floor(score / 200) % 4;
            const sky = [0x87CEEB, 0x00BFFF, 0xFFA500, 0xE0F7FA], grass = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff];
            if(scene) { scene.background.setHex(sky[idx]); scene.fog.color.setHex(sky[idx]); grassPlane.material.color.setHex(grass[idx]); }
        }

        function initControls() {
            window.addEventListener('keydown', e => { 
                if (e.key === 'ArrowLeft') { currentLaneIndex = Math.max(0, currentLaneIndex - 1); targetX = lanes[currentLaneIndex]; }
                if (e.key === 'ArrowRight') { currentLaneIndex = Math.min(2, currentLaneIndex + 1); targetX = lanes[currentLaneIndex]; }
            });
            window.addEventListener('touchstart', e => { 
                if (!gameStarted || settings.ctrl !== 'touch') return; 
                if (e.touches[0].clientX < window.innerWidth / 2) { currentLaneIndex = Math.max(0, currentLaneIndex - 1); } 
                else { currentLaneIndex = Math.min(2, currentLaneIndex + 1); }
                targetX = lanes[currentLaneIndex];
            });
        }
        window.onload = init3D;
    </script>
</body>
</html>
