<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲 - TECH EDITION</title>
    <style>
        /* 💡 回歸原本帥氣的介面樣式 */
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; color: white; }
        .title { font-size: 42px; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 0 20px #00d2ff; margin-bottom: 20px; }
        .setting-group { margin: 12px 0; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); width: 320px; border: 1px solid rgba(255,255,255,0.1); }
        .setting-label { font-size: 13px; color: #00d2ff; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .option-group { display: flex; gap: 10px; justify-content: center; }
        .opt-btn { padding: 8px 18px; border: 1px solid #007bff; background: transparent; color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 15px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 16px 50px; font-size: 24px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 25px rgba(0,123,255,0.5); transition: 0.3s; }
        .start-btn:active { transform: scale(0.95); }

        #ui-layer { position: absolute; top: 25px; left: 25px; right: 25px; pointer-events: none; z-index: 100; }
        #scoreDisplay { font-size: 36px; color: #fff; font-family: 'Orbitron', sans-serif; font-weight: bold; float: right; text-shadow: 0 0 10px #00d2ff; }
        #hp-container { width: 220px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; display: none; margin-bottom: 10px; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); transition: 0.3s; }
        #speedo { color: #00d2ff; font-size: 18px; font-weight: bold; clear: both; float: right; margin-top: 8px; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.2); display: none; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div id="damage-flash"></div>

    <div id="start-screen">
        <div class="title">TURBO TECH</div>
        
        <div class="setting-group">
            <div class="setting-label">🕹️ CONTROL SYSTEM</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">KEY / TOUCH</button>
                <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">SENSOR</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-label">🛡️ DIFFICULTY</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">EASY</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">NORMAL</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">EXPERT</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-label">🔥 MISSION MODE</div>
            <div class="option-group">
                <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 HARDCORE</button>
                <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ CASUAL</button>
            </div>
        </div>

        <button class="start-btn" onclick="requestAndStart()">LAUNCH ENGINE</button>
    </div>

    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="speedo">0 KM/H</div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, gameStarted = false, score = 0;
        let obstacles = [], roadDecor = [], items = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.6, hp = 100, isInvincible = false;
        let settings = { ctrl: 'touch', mode: 'hard', diff: 1 };

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        function requestAndStart() {
            const bgm = document.getElementById('bgm'); bgm.volume = 0.2; bgm.play().catch(() => {});
            if (settings.ctrl === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        }

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            if (settings.mode === 'easy') document.getElementById('hp-container').style.display = 'block';
            currentSpeed = 1.0 + (settings.diff * 0.5); 
            init3D(); initControls(); animate();
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = `${Math.floor(currentSpeed * 50)} KM/H`;
                    if (score % 100 === 0 && currentSpeed < 9) currentSpeed += (0.1 * settings.diff);
                }
            }, 100);
            setInterval(createObstacle, 1000 - (settings.diff * 100));
            setInterval(createDecor, 400);
        }

        function initControls() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
            if (settings.ctrl === 'touch') {
                window.addEventListener('touchstart', (e) => {
                    if (e.touches[0].clientX < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                    else { if (currentLaneIndex < 2) currentLaneIndex++; }
                    targetX = lanes[currentLaneIndex];
                });
            } else {
                window.addEventListener('deviceorientation', (e) => {
                    let tilt = e.gamma;
                    if (tilt < -10) currentLaneIndex = 0; else if (tilt > 10) currentLaneIndex = 2; else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x1a1a2e, 20, 120);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a12);
            document.body.appendChild(renderer.domElement);

            // 💡 寫實柏油路材質
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x151515, specular: 0x333333, shininess: 50 });
            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 💡 科技感霓虹路標
            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 6), new THREE.MeshBasicMaterial({ color: 0x00d2ff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-lanes[0]/2, 0.1, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = lanes[0]/2; scene.add(line2); roadLines.push(line2);
            }

            // 💡 擬真賽車組合
            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 4), new THREE.MeshPhongMaterial({ color: 0x222222, specular: 0xffffff, shininess: 100 }));
            body.position.y = 0.5; car.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.6, 1.8), new THREE.MeshPhongMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.6 }));
            cabin.position.set(0, 1.0, -0.3); car.add(cabin);
            const tailLight = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.2, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            tailLight.position.set(0, 0.6, 2); car.add(tailLight);
            
            scene.add(car); car.position.z = 15;

            // 💡 科技感燈光
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const mainLight = new THREE.DirectionalLight(0x00d2ff, 1);
            mainLight.position.set(5, 20, 10);
            scene.add(mainLight);
            
            camera.position.set(0, 8, 30);
            camera.lookAt(0, 2, 0);
        }

        function createDecor() {
            if (!gameStarted) return;
            const side = Math.random() > 0.5 ? 1 : -1;
            const decor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 0.5), new THREE.MeshBasicMaterial({ color: 0x00d2ff }));
            decor.position.set(side * 15, 2.5, -130);
            scene.add(decor); roadDecor.push(decor);
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.5, 2.5), new THREE.MeshPhongMaterial({ color: 0xff0055, emissive: 0x330000 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.75, -130);
            scene.add(obs); obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1;

            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 45) l.position.z = -200; });
            roadDecor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 45) { scene.remove(d); roadDecor.splice(i, 1); } });
            
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 2.8 && Math.abs(car.position.x - obs.position.x) < 1.7) {
                    if (settings.mode === 'hard') {
                        gameStarted = false; location.reload();
                    } else {
                        hp -= 25; document.getElementById('hp-bar').style.width = hp + "%";
                        scene.remove(obs); obstacles.splice(i, 1);
                        if (hp <= 0) location.reload();
                    }
                }
                if (obs.position.z > 45) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
