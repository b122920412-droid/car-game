<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 體感賽車 - 期末專題版</title>
    <style>
        html, body { margin: 0; overflow: hidden; height: 100%; background: black; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; font-family: sans-serif; }
        #startBtn { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #0066cc; border: none; color: white; border-radius: 5px; }
        #score { margin-top: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="startBtn">開始遊戲 (請先啟動手機遙控器)</button>
        <div id="score">分數：0</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 遊戲變數 (對應你原本的 3D 邏輯)
        let scene, camera, renderer, car;
        let gameStarted = false;
        let lanes = [-2, 0, 2];

        // --- 核心：監聽手機訊號 ---
        onValue(ref(db, 'car/tilt'), (snapshot) => {
            const tilt = snapshot.val() || 0;
            if (gameStarted && car) {
                // AI 穩定化邏輯：傾斜超過 15 度才換車道
                if (tilt < -15) car.position.x = lanes[0]; // 左
                else if (tilt > 15) car.position.x = lanes[2]; // 右
                else car.position.x = lanes[1]; // 中
            }
        });

        // 啟動按鈕
        document.getElementById('startBtn').onclick = () => {
            if (!gameStarted) {
                gameStarted = true;
                document.getElementById('startBtn').style.display = 'none';
                initGame();
                animate();
            }
        };

        function initGame() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 建立簡易 3D 車子 (代表你原本的車)
            const geometry = new THREE.BoxGeometry(1, 0.5, 2);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
            car = new THREE.Mesh(geometry, material);
            scene.add(car);

            // 燈光
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.z = 10;
            camera.position.y = 5;
            camera.lookAt(0, 0, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
