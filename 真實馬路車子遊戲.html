<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 觸控增強版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.8); }
        .btn { padding: 25px 60px; font-size: 30px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; }
        #scoreDisplay { position: absolute; top: 20px; right: 30px; font-size: 50px; color: #00ff00; font-family: monospace; font-weight: bold; text-shadow: 0 0 20px #00ff00; z-index: 100; }
        
        /* 手機 UI 增強 */
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 2000; color: white; text-align: center; }
        #touch-hint { position: absolute; bottom: 10%; width: 100%; color: #888; pointer-events: none; }
        .touch-zone { position: absolute; top: 0; width: 50%; height: 100%; opacity: 0; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn" class="btn">開始遊戲</button>
        <p style="color: #888; margin-top: 20px;">電腦：鍵盤 ← → | 手機：傾斜或點擊左右</p>
    </div>

    <div id="scoreDisplay">00000</div>

    <div id="mobile-ui">
        <button id="sensorBtn" class="btn" style="margin-top: 40vh;">啟動感測器</button>
        <div id="touch-hint">點擊螢幕左/右側 即可切換車道</div>
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');

        if (isMobile) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('overlay').style.display = 'none';

            // 1. 體感控制
            document.getElementById('sensorBtn').onclick = () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') startSensor(); });
                } else { startSensor(); }
            };

            // 2. 觸控控制 (直接傳送目標位置給雲端)
            document.getElementById('left-zone').addEventListener('touchstart', () => sendMove(-1));
            document.getElementById('right-zone').addEventListener('touchstart', () => sendMove(1));
        }

        function startSensor() {
            window.addEventListener('deviceorientation', (e) => {
                let tilt = Math.round(e.gamma);
                set(tiltRef, tilt);
            });
            document.getElementById('sensorBtn').style.display = 'none';
        }

        function sendMove(dir) {
            // 這個邏輯會讓電腦端的 index 更新
            set(ref(db, 'car/move'), Date.now() + "_" + dir);
        }

        // 電腦端監聽
        document.getElementById('startBtn').addEventListener('click', function() {
            gameStarted = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgm').play();
            init3D();
            animate();

            // 監聽手機指令
            onValue(tiltRef, (s) => {
                const t = s.val() || 0;
                if (t < -20) currentLaneIndex = 0;
                else if (t > 20) currentLaneIndex = 2;
                else currentLaneIndex = 1;
                targetX = lanes[currentLaneIndex];
            });

            onValue(ref(db, 'car/move'), (s) => {
                const val = s.val() || "";
                const dir = parseInt(val.split("_")[1]);
                if (dir === -1 && currentLaneIndex > 0) currentLaneIndex--;
                if (dir === 1 && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });

            setInterval(() => { if(gameStarted) { score++; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); } }, 100);
            setInterval(createObstacle, 1100);
        });

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 30, 110);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(16, 2000), new THREE.MeshPhongMaterial({ color: 0x1a1a1a }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-1.7, 0.02, -i * 20);
                scene.add(line);
                roadLines.push(line);
                const line2 = line.clone();
                line2.position.x = 1.7;
                scene.add(line2);
                roadLines.push(line2);
            }

            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 3.5), new THREE.MeshPhongMaterial({ color: 0x0077ff }));
            body.position.y = 0.5; car.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.6), new THREE.MeshPhongMaterial({ color: 0x003399 }));
            cabin.position.set(0, 1.1, -0.2); car.add(cabin);
            
            scene.add(car);
            car.position.z = 10;
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 15, 15); scene.add(sun);

            camera.position.set(0, 6, 24);
            camera.lookAt(0, 1, 0);

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                else if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 2.5), new THREE.MeshPhongMaterial({ color: 0xff4444 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.75, -120);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            roadLines.forEach(l => {
                l.position.z += 1.8;
                if(l.position.z > 50) l.position.z = -1000;
            });
            obstacles.forEach((obs, i) => {
                obs.position.z += 1.6;
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.6) {
                    gameStarted = false;
                    document.getElementById('crashSound').play();
                    document.getElementById('bgm').pause();
                    setTimeout(() => { alert("撞車啦！分數: " + score); location.reload(); }, 200);
                }
                if (obs.position.z > 50) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
