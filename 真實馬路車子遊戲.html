<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亡命飆速 - 音效修復整合版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; color: white; }
        .title { font-size: 42px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px #007bff; margin-bottom: 10px; }
        .warning-text { color: #ff4444; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .setting-group { margin: 8px 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.08); padding: 12px; border-radius: 15px; width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        .setting-label { font-size: 14px; color: #00d2ff; margin-bottom: 8px; font-weight: bold; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .opt-btn { padding: 8px 18px; border: 1px solid #007bff; background: transparent; color: white; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 10px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 15px 45px; font-size: 22px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 20px; box-shadow: 0 5px 20px rgba(0,123,255,0.6); }
        .start-btn:disabled { background: #444; cursor: wait; opacity: 0.7; }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 2000; }
        #scoreDisplay { font-size: 32px; color: #0f0; font-family: monospace; font-weight: bold; float: right; text-shadow: 0 0 10px #0f0; }
        #speedo { color: #fff; font-size: 18px; font-weight: bold; clear: both; float: right; margin-top: 5px; font-family: monospace; }
        #hp-container { width: 180px; height: 15px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 5px; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(to right, #ff3333, #ff6666); transition: 0.3s; }
    </style>
</head>
<body>
    <audio id="bgm" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>
    <audio id="crashSound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg">
    </audio>

    <div id="start-screen">
        <div class="title">亡命飆速</div>
        <div class="warning-text">🚨 系統校正完成！音樂就緒！</div>
        <div class="setting-group">
            <div class="setting-label">🕹️ 操作模式</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤 / 觸控</button>
                <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">手機體感</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🛡️ 挑戰難度</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🔥 遊戲模式</div>
            <div class="option-group">
                <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 一撞即死</button>
                <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ 護甲模式</button>
            </div>
        </div>
        <button id="start-btn" class="start-btn" disabled onclick="handleStart()">資源載入中...</button>
    </div>

    <div id="ui-layer">
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="scoreDisplay">00000</div>
        <div id="speedo">0 KM/H</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, grassPlane, gameStarted = false, score = 0;
        let obstacles = [], decor = [], roadLines = [];
        let obsCarModels = {}, decorModels = { 0: [], 1: [], 2: [], 3: [] }, streetLightModel;
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.0, hp = 100;
        let settings = { ctrl: 'touch', mode: 'hard', diff: 1 };
        let loadedCount = 0;
        const totalToLoad = 12;

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        async function handleStart() {
            // 💡 點擊「進入賽道」時同時啟動音訊與體感權限
            const bgm = document.getElementById('bgm');
            bgm.play().catch(e => console.log("等待互動中..."));
            
            if (settings.ctrl === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
                try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
            }
            requestAndStart();
        }

        function requestAndStart() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            if (settings.mode === 'easy') {
                document.getElementById('hp-container').style.display = 'block';
                hp = 100; updateHPBar();
            }
            currentSpeed = 0.8 + (settings.diff * 0.4); 
            initControls(); animate();
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    currentSpeed += 0.002;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = Math.floor(currentSpeed * 80) + " KM/H";
                    updateSeasons(); 
                }
            }, 100);
            setInterval(createObstacle, 1100 - (settings.diff * 100)); 
            setInterval(createDecor, 450);
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 180);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 50, 10); scene.add(sun);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x222222 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);
            grassPlane = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0x7cfc00 }));
            grassPlane.rotation.x = -Math.PI / 2; grassPlane.position.y = -0.15; scene.add(grassPlane);

            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 7), new THREE.MeshBasicMaterial({ color: 0xcccccc }));
                line.rotation.x = -Math.PI / 2; line.position.set(-1.8, 0.05, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.8; scene.add(line2); roadLines.push(line2);
            }

            const loader = new THREE.GLTFLoader();
            loader.load('car.glb', (gltf) => { 
                let m = gltf.scene; fixMat(m); m.scale.set(4.5, 4.5, 4.5); 
                car = new THREE.Group(); car.add(m); scene.add(car); car.position.z = 15; checkLoaded(); 
            });

            ['car1.glb','car2.glb','car3.glb','car4.glb','car5.glb','car6.glb'].forEach(f => {
                loader.load(f, (g) => { 
                    fixMat(g.scene); 
                    if(f==='car6.glb') g.scene.scale.set(1.8, 1.8, 1.8); else g.scene.scale.set(3.2, 3.2, 3.2);
                    obsCarModels[f] = g.scene; checkLoaded(); 
                }, undefined, () => checkLoaded());
            });

            // 💡 檔名精確修正
            loader.load('birch_trees_pack__ps1_low_poly.glb', (g) => { splitPack(g.scene, 0); splitPack(g.scene, 1); checkLoaded(); });
            loader.load('pine_trees_pack__ps1_low_poly.glb', (g) => { splitPack(g.scene, 2); checkLoaded(); });
            loader.load('snowy_pine_trees_pack__ps1_low_poly.glb', (g) => { splitPack(g.scene, 3); checkLoaded(); });
            loader.load('Snowman.glb', (g) => { fixMat(g.scene); g.scene.scale.set(1,1,1); decorModels[3].push(g.scene); checkLoaded(); });
            loader.load('Street_Light.glb', (g) => { fixMat(g.scene); streetLightModel = g.scene; checkLoaded(); });

            camera.position.set(0, 8, 28); camera.lookAt(0, 2, 0);
        }

        function fixMat(m) { m.traverse(n => { if(n.isMesh) { n.material.transparent = false; n.material.opacity = 1; n.material.depthWrite = true; } }); }
        function splitPack(s, i) { s.traverse(n => { if(n.isMesh) { fixMat(n); decorModels[i].push(n); } }); }
        function checkLoaded() { loadedCount++; if(loadedCount >= totalToLoad) { document.getElementById('start-btn').disabled = false; document.getElementById('start-btn').innerText = "進入賽道"; } }

        function createObstacle() {
            const keys = Object.keys(obsCarModels);
            if (!gameStarted || keys.length === 0) return;
            let k = keys[Math.floor(Math.random() * keys.length)];
            let c = obsCarModels[k].clone();
            c.rotation.y = (k === 'car6.glb') ? 0 : Math.PI / 2;
            c.position.set(lanes[Math.floor(Math.random() * 3)], 0, -150);
            scene.add(c); obstacles.push(c);
        }

        function createDecor() {
            if (!gameStarted) return;
            const idx = Math.floor(score / 200) % 4;
            const side = Math.random() > 0.5 ? 1 : -1;
            let item;
            if (Math.random() < 0.15 && streetLightModel) {
                item = streetLightModel.clone();
                item.scale.set(2.2, 2.2, 2.2);
                item.rotation.y = (side > 0) ? 0 : Math.PI;
            } else if (decorModels[idx].length > 0) {
                item = decorModels[idx][Math.floor(Math.random() * decorModels[idx].length)].clone();
                let s = (item.name && item.name.toLowerCase().includes("snowman")) ? 0.8 : 0.45;
                item.scale.set(s, s, s);
            }
            if (item) { item.position.set(side * (Math.random() * 5 + 13), 0, -200); scene.add(item); decor.push(item); }
        }

        function updateHPBar() { document.getElementById('hp-bar').style.width = hp + "%"; }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.1 + Math.PI; 
            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 40) l.position.z = -200; });
            decor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 40) { scene.remove(d); decor.splice(i, 1); }});
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                if (Math.abs(car.position.z - obs.position.z) < 1.3 && Math.abs(car.position.x - obs.position.x) < 1.0) {
                    // 💡 播放撞擊聲
                    document.getElementById('crashSound').play();
                    
                    if (settings.mode === 'easy') {
                        hp -= 34; updateHPBar(); scene.remove(obs); obstacles.splice(i, 1);
                        if (hp <= 0) endGame();
                    } else { endGame(); }
                }
                if (obs.position.z > 40) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
        function endGame() { gameStarted = false; setTimeout(() => { alert("💥 任務結束！得分: " + score); location.reload(); }, 100); }
        function updateSeasons() {
            const idx = Math.floor(score / 200) % 4;
            const sky = [0x87CEEB, 0xfff9c4, 0xffcc80, 0xd1d9e6], grass = [0x7cfc00, 0x228b22, 0xdaa520, 0xffffff];
            if(scene) { scene.background.setHex(sky[idx]); scene.fog.color.setHex(sky[idx]); grassPlane.material.color.setHex(grass[idx]); }
        }
        function initControls() {
            const l = () => { if (currentLaneIndex > 0) { currentLaneIndex--; targetX = lanes[currentLaneIndex]; } };
            const r = () => { if (currentLaneIndex < 2) { currentLaneIndex++; targetX = lanes[currentLaneIndex]; } };
            window.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') l(); if (e.key === 'ArrowRight') r(); });
            window.addEventListener('touchstart', (e) => { if (!gameStarted || settings.ctrl !== 'touch') return; if (e.touches[0].clientX < window.innerWidth / 2) l(); else r(); });
            window.addEventListener('deviceorientation', (e) => { if (!gameStarted || settings.ctrl !== 'tilt') return; const tilt = e.gamma; if (tilt < -10) currentLaneIndex = 0; else if (tilt > 10) currentLaneIndex = 2; else currentLaneIndex = 1; targetX = lanes[currentLaneIndex]; });
        }
        window.onload = init3D;
    </script>
</body>
</html>
