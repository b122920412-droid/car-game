<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽車小遊戲 - 修復版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #111, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; color: white; }
        .title { font-size: 38px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 15px #007bff; margin-bottom: 20px; }
        .setting-group { margin: 10px 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; width: 310px; }
        .setting-label { font-size: 13px; color: #00d2ff; margin-bottom: 8px; font-weight: bold; }
        .option-group { display: flex; gap: 8px; }
        .opt-btn { padding: 8px 16px; border: 1px solid #007bff; background: transparent; color: white; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .opt-btn.active { background: #007bff; box-shadow: 0 0 10px #007bff; border-color: #00ffcc; }
        .start-btn { padding: 15px 50px; font-size: 22px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,123,255,0.5); }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 100; }
        #scoreDisplay { font-size: 32px; color: #0f0; font-family: monospace; font-weight: bold; float: right; }
        #hp-container { width: 180px; height: 12px; background: #333; border: 1px solid #fff; border-radius: 8px; overflow: hidden; display: none; margin-bottom: 5px; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(to right, #ff3333, #ff6666); transition: 0.2s; }
        #speedo { color: #00d2ff; font-size: 16px; font-weight: bold; font-family: monospace; clear: both; float: right; margin-top: 3px; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); display: none; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>
    <div id="damage-flash"></div>
    <div id="start-screen">
        <div class="title">TURBO RACER</div>
        <div class="setting-group">
            <div class="setting-label">🕹️ 控制模式</div>
            <div class="option-group">
                <button id="ctrl-touch" class="opt-btn active" onclick="setSetting('ctrl', 'touch')">鍵盤 / 點擊</button>
                <button id="ctrl-tilt" class="opt-btn" onclick="setSetting('ctrl', 'tilt')">手機體感</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🛡️ 挑戰難度</div>
            <div class="option-group">
                <button id="diff-1" class="opt-btn active" onclick="setSetting('diff', 1)">簡單</button>
                <button id="diff-2" class="opt-btn" onclick="setSetting('diff', 2)">普通</button>
                <button id="diff-3" class="opt-btn" onclick="setSetting('diff', 3)">困難</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label">🔥 遊戲模式</div>
            <div class="option-group">
                <button id="mode-hard" class="opt-btn active" onclick="setSetting('mode', 'hard')">💀 極限 (一撞即死)</button>
                <button id="mode-easy" class="opt-btn" onclick="setSetting('mode', 'easy')">❤️ 休閒 (有HP)</button>
            </div>
        </div>
        <button class="start-btn" onclick="requestAndStart()">進入賽道</button>
    </div>
    <div id="ui-layer">
        <div id="scoreDisplay">00000</div>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="speedo">0 KM/H</div>
    </div>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
    <audio id="powerupSound" src="https://actions.google.com/sounds/v1/foley/glass_ping.ogg"></audio>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, car, gameStarted = false, score = 0;
        let obstacles = [], roadDecor = [], items = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];
        let currentSpeed = 1.6, hp = 100, isInvincible = false;
        let settings = { ctrl: 'touch', mode: 'hard', diff: 1 };
        
        // 💡 預載幾何體
        const decorGeos = {
            pole: new THREE.CylinderGeometry(0.2, 0.2, 8, 12),
            guard: new THREE.BoxGeometry(0.8, 1.8, 6),
            mtn: new THREE.ConeGeometry(15, 30, 4) // 山脈
        };

        function setSetting(type, val) {
            settings[type] = val;
            document.querySelectorAll(`[id^="${type}-"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${type}-${val}`).classList.add('active');
        }

        function requestAndStart() {
            const bgm = document.getElementById('bgm'); bgm.volume = 0.2; bgm.play().catch(() => {});
            if (settings.ctrl === 'tilt' && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { start(); }).catch(() => start());
            } else { start(); }
        }

        function start() {
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
            if (settings.mode === 'easy') document.getElementById('hp-container').style.display = 'block';
            currentSpeed = 1.2 + (settings.diff * 0.45); 
            init3D(); initControls(); animate();
            setInterval(() => {
                if(gameStarted) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    document.getElementById('speedo').innerText = `${Math.floor(currentSpeed * 48)} KM/H`;
                    if (score % 70 === 0 && currentSpeed < 9) currentSpeed += (0.13 * settings.diff);
                }
            }, 100);
            setInterval(createObstacle, 1100 - (settings.diff * 150));
            setInterval(createItem, 9000);
            setInterval(createRoadDecor, 600); // 💡 生成環境裝飾
        }

        function initControls() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            });
            if (settings.ctrl === 'touch') {
                window.addEventListener('touchstart', (e) => {
                    if (e.touches[0].clientX < window.innerWidth / 2) { if (currentLaneIndex > 0) currentLaneIndex--; }
                    else { if (currentLaneIndex < 2) currentLaneIndex++; }
                    targetX = lanes[currentLaneIndex];
                });
            } else {
                window.addEventListener('deviceorientation', (e) => {
                    const tilt = e.gamma; 
                    if (tilt < -10) currentLaneIndex = 0; else if (tilt > 10) currentLaneIndex = 2; else currentLaneIndex = 1;
                    targetX = lanes[currentLaneIndex];
                });
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            // 💡 修正：移除前段白色迷霧，使用較淡的灰迷霧
            scene.fog = new THREE.Fog(0x333333, 30, 130); 
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x1a1a1a); // 💡 背景色改為深灰
            document.body.appendChild(renderer.domElement);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x111111, specular: 0x444444 }));
            road.rotation.x = -Math.PI / 2; scene.add(road);
            for (let i = 0; i < 60; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 8), new THREE.MeshBasicMaterial({ color: 0x555555 }));
                line.rotation.x = -Math.PI / 2; line.position.set(-1.8, 0.06, -i * 12);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.8; scene.add(line2); roadLines.push(line2);
            }

            // 💡 修正：還原回之前的藍色方塊車模 (幾何幾何體)
            const carGeo = new THREE.BoxGeometry(1.8, 0.5, 4);
            const carMat = new THREE.MeshPhongMaterial({ color: 0x007bff, specular: 0xffffff, shininess: 100 });
            car = new THREE.Mesh(carGeo, carMat);
            car.position.y = 0.5;
            scene.add(car);
            car.position.z = 15;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.9); light.position.set(0, 20, 10); scene.add(light);
            camera.position.set(0, 9, 30); camera.lookAt(0, 2, 0);
        }

        // 💡 多元擬真裝飾系統：增加電線桿、護欄、山脈
        function createRoadDecor() {
            if (!gameStarted) return;
            const type = Math.random();
            const side = Math.random() > 0.5 ? 1 : -1;
            let decor;
            
            if (type < 0.4) { 
                // 🛑 電線桿 (使用 Cylinder幾何體模擬)
                decor = new THREE.Group();
                const pole = new THREE.Mesh(decorGeos.pole, new THREE.MeshPhongMaterial({ color: 0x3d2817 }));
                const cross = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 0.3), new THREE.MeshBasicMaterial({ color: 0x222222 }));
                cross.position.y = 3; decor.add(pole, cross);
                decor.position.set(side * 17, 4, -130);
            } else if (type < 0.7) {
                // 🚧 防撞護欄 (使用 Box幾何體)
                decor = new THREE.Mesh(decorGeos.guard, new THREE.MeshPhongMaterial({ color: 0xcccccc, specular: 0xaaaaaa }));
                decor.position.set(side * 13, 0.9, -130);
            } else {
                // ⛰️ 遠處山脈 (使用 Cone幾何體)
                decor = new THREE.Mesh(decorGeos.mtn, new THREE.MeshPhongMaterial({ color: 0x2a3a2a, fog: true }));
                decor.position.set(side * (40 + Math.random()*20), 15, -200);
            }
            scene.add(decor); roadDecor.push(decor);
        }

        function createObstacle() {
            if (!gameStarted) return;
            const type = Math.random(); let obs;
            const obsMat = new THREE.MeshPhongMaterial({ color: 0xff0055, specular: 0xaaaaaa, shininess: 50 });
            if (type < 0.3) { obs = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.2, 8, 12, Math.PI), obsMat); obs.rotation.x = Math.PI/2; }
            else if (type < 0.6) { obs = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 2.5, 16), obsMat); }
            else { obs = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.8, 2.8), obsMat); }
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.8, -130);
            scene.add(obs); obstacles.push(obs);
        }

        function createItem() {
            if (!gameStarted) return;
            const item = new THREE.Mesh(new THREE.OctahedronGeometry(1.3), new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, shininess: 100 }));
            item.position.set(lanes[Math.floor(Math.random() * 3)], 1.6, -130);
            scene.add(item); items.push(item);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.y = (targetX - car.position.x) * 0.08; 

            roadLines.forEach(l => { l.position.z += currentSpeed; if(l.position.z > 45) l.position.z = -220; });
            roadDecor.forEach((d, i) => { d.position.z += currentSpeed; if(d.position.z > 45) { scene.remove(d); roadDecor.splice(i, 1); } });
            
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed;
                // 💡 修正：還原回之前的碰撞判定
                if (Math.abs(car.position.z - obs.position.z) < 2.8 && Math.abs(car.position.x - obs.position.x) < 1.8) {
                    if (!isInvincible) {
                        if (navigator.vibrate) navigator.vibrate(200);
                        if (settings.mode === 'hard') {
                            gameStarted = false; document.getElementById('crashSound').play();
                            setTimeout(() => { alert("💀 任務失敗！最終得分: " + score); location.reload(); }, 200);
                        } else {
                            hp -= 25; document.getElementById('hp-bar').style.width = hp + "%";
                            document.getElementById('damage-flash').style.display = 'block';
                            setTimeout(() => { document.getElementById('damage-flash').style.display = 'none'; }, 150);
                            document.getElementById('crashSound').play();
                            scene.remove(obs); obstacles.splice(i, 1);
                            if (hp <= 0) { gameStarted = false; setTimeout(() => { alert("💔 引擎損毀！最終得分: " + score); location.reload(); }, 200); }
                        }
                    }
                }
                if (obs.position.z > 45) { scene.remove(obs); obstacles.splice(i, 1); }
            });

            items.forEach((item, i) => {
                item.position.z += currentSpeed; item.rotation.y += 0.2;
                if (Math.abs(car.position.z - item.position.z) < 2.5 && Math.abs(car.position.x - item.position.x) < 1.8) {
                    isInvincible = true; document.getElementById('powerupSound').play();
                    scene.remove(item); items.splice(i, 1); setTimeout(() => { isInvincible = false; }, 4000);
                }
                if (item.position.z > 45) { scene.remove(item); items.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
