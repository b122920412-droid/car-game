<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 賽車 - 進階版</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); }
        .btn { padding: 25px 60px; font-size: 30px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; }
        #scoreDisplay { position: absolute; top: 20px; right: 30px; font-size: 45px; color: #0f0; font-family: monospace; font-weight: bold; text-shadow: 0 0 15px #0f0; z-index: 100; }
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 2000; background: #000; }
        .touch-zone { position: absolute; top: 0; width: 50%; height: 100%; z-index: 2005; }
        #left-zone { left: 0; } #right-zone { right: 0; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn" class="btn">開始挑戰 (電腦點此)</button>
        <p style="color: #666; margin-top: 20px;">支援鍵盤左右鍵 ＆ 手機遙控</p>
    </div>

    <div id="scoreDisplay">00000</div>

    <div id="mobile-ui">
        <div style="text-align:center; margin-top:40vh;"><button id="sensorBtn" class="btn" style="background:#28a745">啟動遙控器</button></div>
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            databaseURL: "https://ai-car-game-default-rtdb.firebaseio.com/", 
            storageBucket: "ai-car-game.firebasestorage.app",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');
        const moveRef = ref(db, 'car/move');

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], trees = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];

        // 💡 1. 動態速度變數
        let currentSpeed = 1.6; // 基礎速度
        let maxSpeed = 3.2; // 最高速度

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
            if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
            targetX = lanes[currentLaneIndex];
        });

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('sensorBtn').onclick = () => {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('deviceorientation', e => set(tiltRef, Math.round(e.gamma))); });
                } else { window.addEventListener('deviceorientation', e => set(tiltRef, Math.round(e.gamma))); }
            };
            document.getElementById('left-zone').ontouchstart = (e) => { e.preventDefault(); set(moveRef, Date.now() + "_-1"); };
            document.getElementById('right-zone').ontouchstart = (e) => { e.preventDefault(); set(moveRef, Date.now() + "_1"); };
        }

        document.getElementById('startBtn').onclick = () => {
            set(moveRef, "0_0"); set(tiltRef, 0); // 歸零
            gameStarted = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgm').play();
            init3D(); animate();
            onValue(tiltRef, s => { 
                const t = s.val() || 0; 
                if (t < -15) currentLaneIndex = 0; else if (t > 15) currentLaneIndex = 2; else currentLaneIndex = 1; 
                targetX = lanes[currentLaneIndex]; 
            });
            onValue(moveRef, s => { 
                const d = parseInt((s.val()||"").split("_")[1]); 
                if (d === -1 && currentLaneIndex > 0) currentLaneIndex--; 
                if (d === 1 && currentLaneIndex < 2) currentLaneIndex++; 
                targetX = lanes[currentLaneIndex]; 
            });
            setInterval(() => { 
                if(gameStarted) { 
                    score++; 
                    document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0');
                    
                    // 💡 2. 速度隨著分數增加 (每 50 分增加一點速度)
                    if (score % 50 === 0 && currentSpeed < maxSpeed) {
                        currentSpeed += 0.1;
                    }
                } 
            }, 100);
            
            // 💡 3. 每 2 秒生成兩棵樹 (路左路右)
            setInterval(createTree, 2000); 

            setInterval(createObstacle, 1100);
        };

        // (3D 引擎初始化部分，代碼不變，為保持代碼整潔，不重複貼出)
        function init3D() {
            scene = new THREE.Scene(); scene.fog = new THREE.Fog(0x000000, 30, 140);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(16, 2000), new THREE.MeshPhongMaterial({ color: 0x1a1a1a })).rotateX(-Math.PI/2));
            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.4), new THREE.MeshPhongMaterial({ color: 0x007bff }));
            body.position.y = 0.5; car.add(body);
            scene.add(car); car.position.set(0, 0, 12);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 15, 10); scene.add(sun);
            camera.position.set(0, 6, 26); camera.lookAt(0, 1, 0);
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2.1, 1.4, 2.5), new THREE.MeshPhongMaterial({ color: 0xff3333 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.7, -100);
            scene.add(obs); obstacles.push(obs);
        }

        // 💡 4. 生成樹木
        function createTree() {
            if (!gameStarted) return;
            
            // 樹幹材質 (MeshPhongMaterial，深灰色橡膠)
            const trunkMaterial = new THREE.MeshPhongMaterial({ color: 0x8b4513 });
            
            // 樹葉材質 (MeshPhongMaterial，金屬光澤的藍色)
            const leavesMaterial = new THREE.MeshPhongMaterial({ color: 0x228b22, specular: 0xffffff, shininess: 50 });

            for (let side = -1; side <= 1; side += 2) { // 一次生成路左 (-1) 和路右 (1)
                const tree = new THREE.Group();
                
                // 樹幹 (圓柱體)
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2.5), trunkMaterial);
                trunk.position.y = 1.25; // 置於車道中間稍微偏左
                tree.add(trunk);
                
                // 樹葉 (錐體)
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.8, 2.5, 8), leavesMaterial);
                leaves.position.y = 3.5; // 置於車身中央偏前
                tree.add(leaves);
                
                tree.position.set(side * 8, 0, -100); // 起始位置
                scene.add(tree);
                trees.push(tree);
            }
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            
            // 💡 5. 障碍物與樹木隨著動態速度移動
            obstacles.forEach((obs, i) => {
                obs.position.z += currentSpeed; // 使用 currentSpeed，而非固定速度
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.7) {
                    gameStarted = false; document.getElementById('crashSound').play();
                    setTimeout(() => { alert("💥 遊戲結束！得分: " + score); location.reload(); }, 300);
                }
                if (obs.position.z > 50) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            
            trees.forEach((tree, i) => {
                tree.position.z += currentSpeed; // 樹木也同步加速移動
                if (tree.position.z > 50) {
                    scene.remove(tree);
                    trees.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
