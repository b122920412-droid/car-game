<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 最終修復</title>
    <style>
        html, body { margin: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; text-align: center; color: white; z-index: 100; top: 20px; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #0066cc; border: none; color: white; border-radius: 8px; font-weight: bold; }
        #scoreDisplay { font-size: 32px; color: #ffff00; font-weight: bold; text-shadow: 2px 2px 4px #000; margin-top: 10px; }
        #mobile-ui { position: absolute; width: 100%; top: 50px; text-align: center; color: white; display: none; z-index: 200; }
        .sensor-btn { padding: 25px; background: #28a745; color: white; border-radius: 20px; width: 80%; font-size: 24px; border: none; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startBtn" class="btn">點擊啟動遊戲</button>
        <div id="scoreDisplay">分數：0</div>
    </div>

    <div id="mobile-ui">
        <h2>AI 手機遙控模式</h2>
        <button id="sensorBtn" class="sensor-btn">啟動體感控制</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], lanes = [-2, 0, 2];

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobile) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('sensorBtn').onclick = () => {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') startSensor(); });
                } else { startSensor(); }
            };
        } else {
            document.getElementById('startBtn').onclick = () => {
                if (!gameStarted) {
                    gameStarted = true;
                    document.getElementById('startBtn').style.display = 'none';
                    initGame();
                    animate();
                    setInterval(createObstacle, 1000);
                }
            };
        }

        function startSensor() {
            window.addEventListener('deviceorientation', (e) => {
                set(tiltRef, Math.round(e.gamma));
            });
            document.getElementById('sensorBtn').innerText = "感測連線中...";
        }

        function initGame() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            car = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2), new THREE.MeshPhongMaterial({ color: 0x0077ff }));
            car.position.set(0, 0.3, 5);
            scene.add(car);

            scene.add(new THREE.AmbientLight(0x404040));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7.5);
            scene.add(light);

            camera.position.set(0, 5, 12);
            camera.lookAt(0, 0, 0);

            // 鍵盤控制 (← → 回中)
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') car.position.x = lanes[0];
                if (e.key === 'ArrowRight') car.position.x = lanes[2];
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') car.position.x = lanes[1];
            });

            // 修正 1：擴大中間車道判定區間，解決「直接跳過」問題
            onValue(tiltRef, (s) => {
                const t = s.val() || 0;
                if (t < -12) car.position.x = lanes[0];       // 往左斜超過 12 度
                else if (t > 12) car.position.x = lanes[2];  // 往右斜超過 12 度
                else car.position.x = lanes[1];              // 12 度以內視為中間
            });
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.5, -50);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            obstacles.forEach((obs, i) => {
                obs.position.z += 0.8;
                // 碰撞偵測
                if (obs.position.z > car.position.z - 0.5 && obs.position.z < car.position.z + 0.5 && obs.position.x === car.position.x) {
                    gameStarted = false; 
                    alert("撞車啦！最終分數：" + score); 
                    location.reload();
                }
                // 修正 2：分數更新邏輯，確保過關後增加分數
                if (obs.position.z > 15) {
                    scene.remove(obs); 
                    obstacles.splice(i, 1); 
                    score += 10;
                    document.getElementById('scoreDisplay').innerText = "分數：" + score;
                }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
