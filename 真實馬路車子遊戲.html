<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感賽車 - 終極修復</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: sans-serif; touch-action: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); }
        .btn { padding: 25px 60px; font-size: 30px; cursor: pointer; background: linear-gradient(135deg, #007bff, #00ffcc); border: none; color: white; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,123,255,0.4); }
        #scoreDisplay { position: absolute; top: 20px; right: 30px; font-size: 45px; color: #00ff00; font-family: monospace; font-weight: bold; z-index: 100; }
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 2000; background: #111; color: white; text-align: center; }
        .touch-zone { position: absolute; top: 0; width: 50%; height: 100%; z-index: 2005; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn" class="btn">開始挑戰 (電腦點此)</button>
        <p style="color: #666; margin-top: 20px;">🔊 點擊後將自動重置連線並開啟音效</p>
    </div>

    <div id="scoreDisplay">00000</div>

    <div id="mobile-ui">
        <div style="margin-top: 40vh; padding: 20px;">
            <button id="sensorBtn" class="btn">啟動遙控器</button>
        </div>
        <div id="left-zone" class="touch-zone"></div>
        <div id="right-zone" class="touch-zone"></div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            databaseURL: "https://ai-car-game-default-rtdb.firebaseio.com/", 
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tiltRef = ref(db, 'car/tilt');
        const moveRef = ref(db, 'car/move');

        let scene, camera, renderer, car, gameStarted = false, score = 0, obstacles = [], roadLines = [];
        let lanes = [-3.5, 0, 3.5], currentLaneIndex = 1, targetX = lanes[1];

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('sensorBtn').onclick = function() {
                this.style.background = "#28a745";
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('deviceorientation', (e) => set(tiltRef, Math.round(e.gamma))); });
                } else { window.addEventListener('deviceorientation', (e) => set(tiltRef, Math.round(e.gamma))); }
            };
            document.getElementById('left-zone').ontouchstart = (e) => { e.preventDefault(); set(moveRef, Date.now() + "_-1"); };
            document.getElementById('right-zone').ontouchstart = (e) => { e.preventDefault(); set(moveRef, Date.now() + "_1"); };
        }

        document.getElementById('startBtn').onclick = function() {
            // 💡 1. 物理級重置：開局先強制把雲端數據設為 0，防止車子亂跑
            set(tiltRef, 0);
            set(moveRef, "0_0");
            
            gameStarted = true;
            document.getElementById('overlay').style.display = 'none';
            
            // 💡 2. 音效暴力解鎖
            const bgm = document.getElementById('bgm');
            const crash = document.getElementById('crashSound');
            bgm.play();
            crash.play().then(() => { crash.pause(); crash.currentTime = 0; }).catch(e => console.log(e));

            init3D(); animate();
            
            onValue(tiltRef, (s) => { 
                const t = s.val() || 0; 
                if (t < -15) currentLaneIndex = 0; else if (t > 15) currentLaneIndex = 2; else currentLaneIndex = 1; 
                targetX = lanes[currentLaneIndex]; 
            });
            onValue(moveRef, (s) => { 
                const dir = parseInt((s.val()||"").split("_")[1]); 
                if (dir === -1 && currentLaneIndex > 0) currentLaneIndex--; 
                if (dir === 1 && currentLaneIndex < 2) currentLaneIndex++; 
                targetX = lanes[currentLaneIndex]; 
            });

            setInterval(() => { if(gameStarted) { score++; document.getElementById('scoreDisplay').innerText = score.toString().padStart(5, '0'); } }, 100);
            setInterval(createObstacle, 1100);
        };

        function init3D() {
            scene = new THREE.Scene(); scene.fog = new THREE.Fog(0x000000, 30, 140);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(16, 2000), new THREE.MeshPhongMaterial({ color: 0x1a1a1a })).rotateX(-Math.PI/2));
            for (let i = 0; i < 40; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 5), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2; line.position.set(-1.75, 0.05, -i * 15);
                scene.add(line); roadLines.push(line);
                const line2 = line.clone(); line2.position.x = 1.75; scene.add(line2); roadLines.push(line2);
            }
            
            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.4), new THREE.MeshPhongMaterial({ color: 0x007bff }));
            body.position.y = 0.5; car.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.4), new THREE.MeshPhongMaterial({ color: 0x003399 }));
            cabin.position.set(0, 1.05, -0.2); car.add(cabin);
            const wG = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 16); const wM = new THREE.MeshPhongMaterial({ color: 0x222222 });
            [[-0.9,-1.1],[0.9,-1.1],[-0.9,1.1],[0.9,1.1]].forEach(p => { const w = new THREE.Mesh(wG, wM); w.rotation.z = Math.PI/2; w.position.set(p[0], 0.4, p[1]); car.add(w); });
            scene.add(car); car.position.z = 12;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 15, 10); scene.add(sun);
            camera.position.set(0, 6, 26); camera.lookAt(0, 1, 0);
            
            window.onkeydown = (e) => {
                if (e.key === 'ArrowLeft' && currentLaneIndex > 0) currentLaneIndex--;
                if (e.key === 'ArrowRight' && currentLaneIndex < 2) currentLaneIndex++;
                targetX = lanes[currentLaneIndex];
            };
        }

        function createObstacle() {
            if (!gameStarted) return;
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2.1, 1.4, 2.5), new THREE.MeshPhongMaterial({ color: 0xff3333 }));
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.7, -100);
            scene.add(obs); obstacles.push(obs);
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);
            car.position.x += (targetX - car.position.x) * 0.15;
            roadLines.forEach(l => { l.position.z += 1.8; if(l.position.z > 40) l.position.z = -200; });
            obstacles.forEach((obs, i) => {
                obs.position.z += 1.6;
                if (Math.abs(car.position.z - obs.position.z) < 2.5 && Math.abs(car.position.x - obs.position.x) < 1.7) {
                    gameStarted = false;
                    const crash = document.getElementById('crashSound');
                    crash.play().catch(e => console.log(e)); // 播放音效
                    document.getElementById('bgm').pause();
                    setTimeout(() => { alert("💥 遊戲結束！得分: " + score); location.reload(); }, 300);
                }
                if (obs.position.z > 50) { scene.remove(obs); obstacles.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
