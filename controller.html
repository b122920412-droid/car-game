<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 體感遙控器</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; padding-top: 50px; }
        #start { padding: 25px; background: #28a745; color: white; border: none; border-radius: 20px; width: 80%; font-size: 24px; font-weight: bold; }
        #angle { font-size: 80px; color: #00ff00; margin: 50px 0; }
        .hint { color: #888; padding: 20px; }
    </style>
</head>
<body>
    <h2>AI 跨裝置控制端</h2>
    <p class="hint">請水平拿穩手機，點擊下方啟動</p>
    <button id="start" onclick="init()">啟動感測器</button>
    <div id="angle">0°</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2-YD5-cdNaPf7-5Hfzjj_yGOHBaLWN6s",
            authDomain: "ai-car-game.firebaseapp.com",
            projectId: "ai-car-game",
            storageBucket: "ai-car-game.firebasestorage.app",
            messagingSenderId: "610670474643",
            appId: "1:610670474643:web:5c28d61b9300644fad2466"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.init = () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') listen(); });
            } else { listen(); }
        };

        function listen() {
            document.getElementById('start').innerText = "感測中...";
            document.getElementById('start').style.background = "#444";
            window.addEventListener('deviceorientation', (e) => {
                let tilt = Math.round(e.gamma);
                document.getElementById('angle').innerText = tilt + "°";
                set(ref(db, 'car/tilt'), tilt);
            });
        }
    </script>
</body>
</html>
